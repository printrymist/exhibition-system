<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      background-color: #f4f4f9;
      color: #333;
      margin: 0;
      padding: 15px;
    }

    .unity-container {
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    #unityGlobalLoading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20000;
    }

    .reg-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      margin: auto;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #444;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 12px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 16px;
    }

    .quick-box {
      background: #eef2f7;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d1d9e6;
      margin-bottom: 15px;
    }

    .sns-group {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #eee;
      margin-top: 15px;
    }

    .btn-blue {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      background: #1a73e8;
      color: white;
      font-size: 16px;
    }

    .btn-gray {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      background: #eee;
      color: #333;
      font-size: 16px;
    }

    .preview-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid #ddd;
    }

    .confirm-val {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      border-bottom: 1px solid #eee;
      padding-bottom: 2px;
    }

    #regFileBtn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 2px dashed #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 15px;
      background: #fafafa;
      color: #555;
      cursor: pointer;
      text-align: center;
    }

    #regFileBtn:hover {
      background: #f0f4ff;
      border-color: #1a73e8;
      color: #1a73e8;
    }

    #regFileInput {
      display: none;
    }

    #regLoadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      color: white;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top: 5px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .ans-container {
      width: 350px;
      max-width: 92%;
      background: white;
      padding: 30px 20px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      margin: auto;
      position: relative;
    }

    .ex-header {
      font-size: 0.85em;
      color: #888;
      letter-spacing: 0.05em;
      margin-bottom: 15px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    #ansAlreadyLikedMsg {
      display: none;
      color: #e91e63;
      font-weight: bold;
      font-size: 1.05em;
      margin-bottom: 15px;
    }

    .work-img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .work-info h2 {
      margin: 0;
      font-size: 1.4em;
      font-weight: bold;
      overflow-wrap: break-word;
      line-height: 1.4;
      padding: 0 10px;
    }

    .work-info p {
      margin: 5px 0 25px 0;
      color: #666;
      overflow-wrap: break-word;
      padding: 0 10px;
    }

    textarea {
      width: 100%;
      margin-bottom: 15px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 16px;
    }

    .btn-black {
      width: 100%;
      padding: 18px;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: #000;
    }

    #ansSnsSection {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px dashed #ddd;
      display: none;
    }

    .sns-area {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 15px;
    }

    .sns-btn {
      text-decoration: none;
      color: #555;
      font-size: 10px;
      width: 60px;
      font-weight: bold;
    }

    .sns-icon {
      font-size: 24px;
      background: #f0f2f5;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 5px auto;
    }

    .fade-in {
      animation: fadeInAnim 0.6s ease-out forwards;
    }

    .heart-icon {
      color: #e91e63;
      font-size: 40px;
      margin-bottom: 10px;
    }

    .decoration-footer {
      margin-top: 40px;
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
    }

    #langToggle {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #f0f2f5;
      border: none;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      color: #555;
    }

    #langToggleReg {
      display: block;
      margin: 0 auto 15px auto;
      background: #f0f2f5;
      border: none;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      color: #555;
    }
  </style>
</head>

<body>

  <div id="sandboxBadge" style="display:none; max-width:600px; margin:10px auto;"></div>

  <div id="ansSnsSyncModal"

  <div id="ansPwModal"

    <div

      <h3 id="pwModalTitle" style="margin-top:0; font-size:1.2em; color:#333;">管理者ログイン</h3>
      <p id="pwModalDesc" style="font-size:0.9em; color:#666;">パスワードを入力してください</p>

      <button id="ansPwSubmitBtn" class="btn-black" style="margin-bottom:10px;">認証する</button>
      <button id="ansPwCancelBtn" class="btn-gray" style="margin-top:0;">キャンセル</button>

  <div id="unityGlobalLoading">

    <div id="globalLoadingMsg" style="font-weight:bold; color:#666;">作品ステータスを確認中...</div>
  </div>

  <div class="unity-container">
    <div id="regWrapper" style="display:none; width: 100%;">
      <div id="regLoadingOverlay">
        <div class="spinner"></div>
        <div id="regSavingMsg" style="font-weight:bold; font-size:18px;">保存しています...</div>
      </div>
      <div class="reg-card" id="regMainCard">

        <div id="regStep0" class="step">

          <input type="password" id="regPassInput">
          <button class="btn-blue" onclick="regCheckLogin()" id="regLoginBtn">ログイン</button>
        </div>
        <div id="regStep1" class="step">
          <div id="regQuickSelectArea" class="quick-box" style="display:none;">
            <small id="regQuickSelectLabel" style="color:#1a73e8; font-weight:bold;">以前の登録情報から選ぶ</small>
            <select id="regArtistSelect" onchange="regApplyArtistInfo()">
              <option value="" id="regSelectDefault">-- 作家名を選択 --</option>
            </select>
          </div>
          <label id="regLabelArtist">作家名</label><input type="text" id="regArtistName">
          <label id="regLabelTitle">作品名</label><input type="text" id="regWorkTitle">
          <div class="sns-group">
            <small id="regSnsLabel" style="font-weight:bold;">📱 SNS ID入力</small>
            <input type="text" id="regSnsInsta" placeholder="Instagram ID">
            <input type="text" id="regSnsX" placeholder="X (Twitter) ID">
            <input type="text" id="regSnsFb" placeholder="Facebook ID">
            <input type="text" id="regSnsWeb" placeholder="HPまたはYouTubeのURL">
          </div>
          <label id="regLabelPhoto">作品写真</label>
          <input type="file" id="regFileInput" accept="image/*">

    <div id="ansWrapper" style="display:none; width: 100%;">

        <div id="ansLoading">読み込み中...</div>
        <div id="ansMainContent" style="display:none;">
          <div class="ex-header" id="ansDisplayExName"></div>
          <div id="ansAlreadyLikedMsg">いいね受付済みです、追加コメントを受け付けます。</div>
          <div id="ansThankYou" style="display:none;">

          </div>

                <input type="hidden" name="ex" id="ansExInput">
                <input type="hidden" name="workTitle" id="ansWorkTitleInput">

  <script>
    // =========================================================
    // 🌟 GAS URL設定
    // =========================================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzMbHtoC-bmGQQIYFKFkCsxjoKKFue0_HZB3En24Z9H2awkuWDQL1SBYeOQOfnt4OdT/exec';

    // =========================================================
    // 🌟 URLパラメータ取得（GASのテンプレート変数を置き換え）
    // =========================================================
    const urlParams = new URLSearchParams(window.location.search);
    const exVal  = urlParams.get('ex')  || '';
    const idVal  = urlParams.get('id')  || '';
    const keyVal = urlParams.get('key') || '';
    const expVal = urlParams.get('exp') || '';
    const sigVal = urlParams.get('sig') || '';

    // =========================================================
    // 🌟 GAS通信共通関数（google.script.runの代替）
    // =========================================================
    function gasCall(action, extraParams) {
      const postParams = new URLSearchParams();
      postParams.append('action', action);
      postParams.append('ex', exVal);
      postParams.append('id', idVal);
      postParams.append('key', keyVal);
      if (expVal) postParams.append('exp', expVal);
      if (sigVal) postParams.append('sig', sigVal);
      if (extraParams) {
        Object.keys(extraParams).forEach(k => {
          postParams.append(k, typeof extraParams[k] === 'object'
            ? JSON.stringify(extraParams[k])
            : extraParams[k]);
        });
      }
      return fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: postParams
      }).then(res => res.json());
    }

    // =========================================================
    // 🌟 多言語辞書
    // =========================================================
    const i18n = {
      ja: {

        ansResetConfirm:      "応援記録をリセットしてテストし直しますか？",
        pwModalTitle:         "管理者ログイン",

        pwSubmitBtn:          "認証する",

        syncSubmitBtn:        "はい、一括更新する",
        syncCancelBtn:        "キャンセル",
        syncNotSet:           "未設定",
        syncWebSet:           "設定あり",
        syncDone:             "同期完了！",
        alertLogout:          "ログアウトしました。",
        alertUnlock:          "作品の登録を解除しました。再登録が可能です。",
        regSaving:            "保存しています...",
        regPwPrompt:          "管理パスワードを入力してください",
        regLoginBtn:          "ログイン",
        regPwFail:            "パスワードが違います",
        regQuickSelectLabel:  "以前の登録情報から選ぶ",
        regSelectDefault:     "-- 作家名を選択 --",
        regLabelArtist:       "作家名",
        regLabelTitle:        "作品名",
        regSnsLabel:          "📱 SNS ID入力",
        regSnsWebPlaceholder: "HPまたはYouTubeのURL",
        regLabelPhoto:        "作品写真",

        regConfirmBtn:        "内容を確認する",
        regPhotoRequired:     "写真を選択してください",
        regSnsWebSet:         "登録あり",
        regSnsSummaryLabel:   "📱 SNS連携: ",
        regSnsNone:           "📱 SNS連携: なし",
        regConfirmTitle:      "登録内容の最終確認",
        regConfirmArtistLabel:"作家名:",

      en: {

        langBtn:              "JP",

        ansAlreadyLiked:      "You've already liked this. You can still leave a comment.",

        regSnsWebSet:         "Set",

        regSnsNone:           "📱 SNS: None",
        regConfirmTitle:      "Confirm registration",
        regConfirmArtistLabel:"Artist:",
        regConfirmTitleLabel: "Title:",
        regSubmitBtn:         "Confirm & Register",
        regEditBtn:           "Edit",
        regDoneTitle:         "Registered!",

    const browserLang = (navigator.language || "ja").startsWith("ja") ? "ja" : "en";
    let currentLang = localStorage.getItem("rohei_lang") || browserLang;

    function t(key) {
      return (i18n[currentLang] && i18n[currentLang][key]) || i18n["ja"][key] || key;
    }

    function applyLang() {
      document.getElementById('langToggle').innerText = t('langBtn');
      document.getElementById('langToggleReg').innerText = t('langBtn');
      document.getElementById('globalLoadingMsg').innerText = t('globalLoading');
      document.getElementById('ansLoading').innerText = t('ansLoading');
      document.getElementById('ansAlreadyLikedMsg').innerText = t('ansAlreadyLiked');

    function toggleLang() {
      currentLang = (currentLang === "ja") ? "en" : "ja";
      localStorage.setItem("rohei_lang", currentLang);
      reloadApp();
    }

    // =========================================================
    // 🌟 アプリ共通処理
    // =========================================================
    function reloadApp() {
      document.getElementById('unityGlobalLoading').style.display = 'flex';
      document.getElementById('globalLoadingMsg').innerText = t('globalLoading');
      document.getElementById('regWrapper').style.display = 'none';
      document.getElementById('ansWrapper').style.display = 'none';
      var btn = document.getElementById('ansSubmitBtn');
      if (btn) { btn.innerText = t('ansSubmitBtn'); btn.disabled = false; }
      document.getElementById('ansThankYou').style.display = 'none';
      document.getElementById('ansInputView').style.display = 'block';
      document.getElementById('ansLoading').style.display = 'block';
      document.getElementById('ansMainContent').style.display = 'none';
      document.getElementById('ansAlreadyLikedMsg').style.display = 'none';

      // 🟣 Firestore から作品ステータスを取得（フェーズ3）
      fsGetArtworkData(exVal, idVal).then(data => {
        document.getElementById('unityGlobalLoading').style.display = 'none';
        if (!data.success) {
          alert("エラー: " + (data.msg || "データ取得失敗"));
          return;
        }
        if (data.isRegistered) {
          document.getElementById('ansWrapper').style.display = 'block';
          ansInit(exVal, idVal, data);
        } else {
          document.getElementById('regWrapper').style.display = 'block';
          regInit(exVal, idVal);
        }
      }).catch(err => {
        alert("通信エラー: " + err.message);
      });
    }

    window.onload = () => {
      applyLang();
      document.getElementById('unityGlobalLoading').style.display = 'flex';

      // 🟣 Firestore から作品データ + 展覧会名を取得（フェーズ3）
      fsGetArtworkData(exVal, idVal).then(data => {
        document.getElementById('unityGlobalLoading').style.display = 'none';
        if (!data.success) {
          alert("エラー: " + (data.msg || "データ取得失敗"));
          return;
        }
        // セッション 3: keyVal チェックは撤去 (実 security は Cloud Function 側で
        // HMAC 検証して担保する。security_key は URL に乗らない方針)。
        if (data.isRegistered) {
          document.getElementById('ansWrapper').style.display = 'block';
          ansInit(exVal, idVal, data);
        } else {
          document.getElementById('regWrapper').style.display = 'block';
          regInit(exVal, idVal);
        }
      }).catch(err => {
        document.getElementById('unityGlobalLoading').style.display = 'none';
        alert("通信エラー: " + err.message);
      });
    };

    // =========================================================
    // 🔵 登録用ロジック
    // =========================================================
    let regConfig = {};
    let regRawImgData = null;
    let regImageRequired = true; // registration_fields に image_url 設定が無い場合のデフォルト
    const regStorageKey = "rohei_auth_" + exVal;

    async function hashText(text) {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function regLoadImageRequired(exCode) {
      try {
        const snap = await fsDb.collection('exhibitions').doc(exCode).get();
        if (!snap.exists) return; // デフォルト（必須）のまま
        const raw = snap.data().registration_fields;
        if (!raw) return;
        let fields;
        try { fields = JSON.parse(raw); } catch (e) { return; }
        if (!Array.isArray(fields)) return;
        const img = fields.find(f => f && f.name === 'image_url');
        if (!img) {
          // 設定に image_url が含まれていない＝画像欄を使わない展覧会扱い
          regImageRequired = false;
        } else {
          regImageRequired = !!img.required;
        }
      } catch (e) {
        console.warn('regLoadImageRequired failed:', e);
      }
    }

    function regInit(ex, id) {
      regRawImgData = null;
      applyLang();
      regLoadImageRequired(ex);
      gasCall('regGetSetupData').then(async res => {
        if (!res.success) return alert("エラー: " + res.error);
        regConfig = res;
        document.getElementById('regExName').innerText = res.exName;
        document.getElementById('regArtistName').value = res.artistName || '';
        document.getElementById('regWorkTitle').value = res.workTitle || '';
        document.getElementById('regSnsInsta').value = (res.sns && res.sns.insta) || '';
        document.getElementById('regSnsX').value = (res.sns && res.sns.x) || '';
        document.getElementById('regSnsFb').value = (res.sns && res.sns.fb) || '';
        document.getElementById('regSnsWeb').value = (res.sns && res.sns.web) || '';
        if (res.imageUrl) {
          document.getElementById('regLocalPreview').src = res.imageUrl;
          document.getElementById('regLocalPreview').style.display = 'block';
        }
        if (res.registeredArtists && res.registeredArtists.length > 0) {
          const sel = document.getElementById('regArtistSelect');
          sel.innerHTML = '<option value="" id="regSelectDefault">' + t('regSelectDefault') + '</option>';
          res.registeredArtists.forEach((a, i) => {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = a.name; sel.appendChild(opt);
          });
          document.getElementById('regQuickSelectArea').style.display = 'block';
        }
        const savedHash = localStorage.getItem(regStorageKey);
        const currentHash = await hashText(res.masterPass);
        if (savedHash === currentHash) regChangeStep(1);
        else regChangeStep(0);
      }).catch(err => alert("通信エラー: " + err.message));
    }

    function regCleanSnsId(val) {
      if (!val) return "";
      val = val.toString().trim();
      if (val.includes('http')) {
        val = val.split('/').filter(Boolean).pop();
        if (val.includes('?')) val = val.split('?')[0];
      }
      val = val.replace(/^[＠@]+/, "").trim();
      return val;
    }

    function regApplyArtistInfo() {
      const idx = document.getElementById('regArtistSelect').value;
      if (idx === "") return;
      const a = regConfig.registeredArtists[idx];
      document.getElementById('regArtistName').value = a.name;
      document.getElementById('regSnsInsta').value = a.insta;
      document.getElementById('regSnsX').value = a.x;
      document.getElementById('regSnsFb').value = a.fb;
      document.getElementById('regSnsWeb').value = a.web;
    }

    async function regCheckLogin() {
      if (document.getElementById('regPassInput').value === regConfig.masterPass) {
        const hash = await hashText(regConfig.masterPass);
        localStorage.setItem(regStorageKey, hash);
        regChangeStep(1);
      } else alert(t('regPwFail'));
    }

    document.getElementById('regFileInput').onchange = (e) => {
      if (!e.target.files || e.target.files.length === 0) return;
      const imgUrl = URL.createObjectURL(e.target.files[0]);
      const img = new Image();
      img.onload = () => {
        URL.revokeObjectURL(imgUrl);
        const canvas = document.createElement('canvas');
        const size = 800; canvas.width = size; canvas.height = size;
        const min = Math.min(img.width, img.height);
        canvas.getContext('2d').drawImage(img, (img.width - min) / 2, (img.height - min) / 2, min, min, 0, 0, size, size);
        regRawImgData = canvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('regLocalPreview').src = regRawImgData;
        document.getElementById('regLocalPreview').style.display = 'block';
        document.getElementById('regFileBtn').innerText = '✅ ' + e.target.files[0].name;
      };
      img.src = imgUrl;
    };

    function regToConfirm() {
      if (regImageRequired && !regRawImgData && !regConfig.imageUrl) return alert(t('regPhotoRequired'));
      const insta = regCleanSnsId(document.getElementById('regSnsInsta').value);
      const x = regCleanSnsId(document.getElementById('regSnsX').value);
      const fb = regCleanSnsId(document.getElementById('regSnsFb').value);
      const web = document.getElementById('regSnsWeb').value.trim();
      document.getElementById('regVArtist').innerText = document.getElementById('regArtistName').value || "-";
      document.getElementById('regVTitle').innerText = document.getElementById('regWorkTitle').value || "-";
      document.getElementById('regFinalPreview').src = regRawImgData || regConfig.imageUrl;
      let snsList = [];
      if (insta) snsList.push("Insta: " + insta);
      if (x) snsList.push("X: " + x);
      if (fb) snsList.push("FB: " + fb);
      if (web) snsList.push("Web: " + t('regSnsWebSet'));
      const snsDiv = document.getElementById('regVSnsSummary');
      snsDiv.innerText = snsList.length > 0 ? t('regSnsSummaryLabel') + snsList.join(" / ") : t('regSnsNone');
      snsDiv.style.marginTop = "10px";
      snsDiv.style.paddingTop = "10px";
      snsDiv.style.borderTop = "1px dashed #ccc";
      regChangeStep(2);
    }

    function regChangeStep(n) {
      document.querySelectorAll('#regWrapper .step').forEach((s, i) => s.classList.toggle('active', i === n));
      applyLang();
      window.scrollTo(0, 0);
    }

    async function regFinalSubmit() {
      document.getElementById('regLoadingOverlay').style.display = 'flex';
      const artistName = document.getElementById('regArtistName').value;
      const workTitle = document.getElementById('regWorkTitle').value;
      const sns = {
        insta: regCleanSnsId(document.getElementById('regSnsInsta').value),
        x: regCleanSnsId(document.getElementById('regSnsX').value),
        fb: regCleanSnsId(document.getElementById('regSnsFb').value),
        web: document.getElementById('regSnsWeb').value
      };

      let imageUrl = '';
      try {
        if (regRawImgData && window.fsUploadArtworkImage) {
          imageUrl = await window.fsUploadArtworkImage(exVal, idVal, regRawImgData);
        }
      } catch (e) {
        document.getElementById('regLoadingOverlay').style.display = 'none';
        alert('画像アップロードエラー: ' + e.message);
        return;
      }

      try {
        const artistFields = { artist: artistName, insta: sns.insta, x: sns.x, facebook: sns.fb, web: sns.web };
        const selfFields = { ...artistFields, title: workTitle, status: "1" };
        if (imageUrl) selfFields.image_url = imageUrl;

        await window.fsSetArtwork(exVal, idVal, selfFields);

        let updatedArtistCount = 1;
        const targetArtist = artistName.trim();
        if (targetArtist) {
          const snap = await fsDb.collection('artworks')
            .where('exCode', '==', exVal)
            .where('artist', '==', targetArtist)
            .get();
          const tasks = [];
          snap.forEach(doc => {
            if (doc.id === exVal + '_' + idVal) return;
            const otherId = doc.data().artwork_id;
            if (!otherId) return;
            tasks.push(window.fsSetArtwork(exVal, otherId, artistFields).catch(e => console.error('Firestore propagation:', e)));
            updatedArtistCount++;
          });
          await Promise.all(tasks);
        }

        document.getElementById('regLoadingOverlay').style.display = 'none';
        regChangeStep(3);
        if (updatedArtistCount > 1) {
          const msgEl = document.getElementById('regDoneMsg');
          if (msgEl) msgEl.textContent = '作品情報が正常に保存されました。（作家情報を' + updatedArtistCount + '件の作品に反映）';
        }
      } catch (err) {
        document.getElementById('regLoadingOverlay').style.display = 'none';
        alert(t('regError') + err.message);
      }
    }

    function getOrCreateSessionId() {
      // localStorage を使うとブラウザ単位（≒ 1人）で同じ sessionId が維持される
      let sid = localStorage.getItem("rohei_session_id") || sessionStorage.getItem("rohei_session_id");
      if (!sid) {
        sid = "s_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
      }
      localStorage.setItem("rohei_session_id", sid);
      sessionStorage.setItem("rohei_session_id", sid);
      return sid;
    }

    // =========================================================
    // 🟡 回答用ロジック
    // =========================================================
    function ansInit(ex, id, embeddedData) {
      document.getElementById('ansIsLikeInput').value = "1";
      document.getElementById('ansSessionIdInput').value = getOrCreateSessionId();
      document.getElementById('ansWorkIDInput').value = id;
      document.getElementById('ansExInput').value = ex;
      applyLang();

      if (embeddedData && embeddedData.success) {
        document.getElementById('ansLoading').style.display = 'none';
        ansRenderData(embeddedData, ex, id);
        return;
      }

      fsGetArtworkData(ex, id).then(res => {
        document.getElementById('ansLoading').style.display = 'none';
        ansRenderData(res, ex, id);
      }).catch(err => {
        document.getElementById('ansLoading').innerHTML =
          '<div style="color:red">通信エラー: ' + err.message + '</div>';
      });
    }

    function ansRenderData(res, ex, id) {
      if (!res || !res.success) {
        document.getElementById('ansLoading').innerHTML =
          '<div style="color:red">Error: ' + (res ? res.msg : "No data") + '</div>';
        return;
      }
      document.getElementById('ansDisplayExName').innerText = res.exName;
      document.getElementById('ansDisplayTitle').innerText = res.title;
      document.getElementById('ansDisplayArtist').innerText = res.artist;
      document.getElementById('ansWorkTitleInput').value = res.title;
      document.getElementById('ansWorkArtistInput').value = res.artist;
      applyCommentWindow(res.commentsStartAt, res.commentsEndAt);
      if (res.image) {
        let imgSrc = res.image;
        if (imgSrc.indexOf('drive.google.com') !== -1) {
          var match = imgSrc.match(/[-\w]{25,}/);
          if (match) imgSrc = "https://drive.google.com/thumbnail?id=" + match[0] + "&sz=w400";
        }
        document.getElementById('ansMainImg').src = imgSrc;
        document.getElementById('ansMainImg').style.display = 'block';
      }
      ansShowSnsButtons(res.sns);
      if (localStorage.getItem("voted_" + ex + "_" + id)) {
        document.getElementById('ansIsLikeInput').value = "0";
        document.getElementById('ansSubmitBtn').innerText = t('ansSubmitBtnAdded');
        document.getElementById('ansAlreadyLikedMsg').style.display = 'block';
      }
      var savedNickname = localStorage.getItem("nickname_" + ex);
      if (savedNickname) {
        document.getElementById('ansNicknameInput').value = savedNickname;
      }
      document.getElementById('ansMainContent').style.display = 'block';
    }

    function applyCommentWindow(startIso, endIso) {
      const now = Date.now();
      const start = startIso ? new Date(startIso).getTime() : null;
      const end = endIso ? new Date(endIso).getTime() : null;
      let outOfWindow = false;
      let reason = '';
      if (start && !isNaN(start) && now < start) {
        outOfWindow = true;
        reason = '感想の受付は ' + new Date(start).toLocaleString('ja-JP') + ' から開始されます。';
      } else if (end && !isNaN(end) && now > end) {
        outOfWindow = true;
        reason = '感想の受付期間は終了しました。';
      }
      const formContainer = document.getElementById('ansFormContainer');
      let notice = document.getElementById('ansWindowNotice');
      if (outOfWindow) {
        if (formContainer) formContainer.style.display = 'none';
        if (!notice) {
          notice = document.createElement('div');
          notice.id = 'ansWindowNotice';
          notice.style.cssText = 'margin:18px 0; padding:14px; background:#fff8e1; color:#8a6d3b; border:1px solid #ffe0a3; border-radius:8px; text-align:center; font-size:0.95em;';
          formContainer.parentNode.insertBefore(notice, formContainer);
        }
        notice.textContent = reason;
        notice.style.display = 'block';
      } else {
        if (formContainer) formContainer.style.display = '';
        if (notice) notice.style.display = 'none';
      }
    }

    function ansShowSnsButtons(snsData) {
      if (!snsData) return;
      var snsArea = document.getElementById('ansSnsButtons');
      snsArea.innerHTML = "";
      var hasSns = false;
      const icons = { insta: "📷", x: "𝕏", fb: "📘", web: "🌐" };
      const urls = { insta: "https://www.instagram.com/", x: "https://x.com/", fb: "https://www.facebook.com/", web: "https://" };
      ["insta", "x", "fb", "web"].forEach(key => {
        if (snsData[key] && snsData[key].trim() !== "") {
          hasSns = true;
          var val = snsData[key].trim();
          var link = val.startsWith("http") ? val : urls[key] + val.replace(/^@/, "");
          var a = document.createElement("a");
          a.href = link; a.target = "_blank"; a.className = "sns-btn";
          a.innerHTML = '<div class="sns-icon">' + icons[key] + '</div>' +
            key.charAt(0).toUpperCase() + key.slice(1);
          snsArea.appendChild(a);
        }
      });
      if (hasSns) document.getElementById('ansSnsSection').style.display = "block";
    }

    function ansResetForm() {
      var adminKey = "isAdmin_" + exVal;
      if (localStorage.getItem(adminKey) === "true") {
        if (confirm(t('ansResetConfirm'))) {
          localStorage.removeItem("voted_" + exVal + "_" + idVal);
          reloadApp();
        }
      }
    }

    document.getElementById('ansLikeForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('ansSubmitBtn');
      var originalText = btn.innerText;
      btn.innerText = t('ansSubmitBtnSending');
      btn.disabled = true;

      const formPayload = {
        sessionId: document.getElementById('ansSessionIdInput').value,
        workID: idVal,
        ex: exVal,
        workTitle: document.getElementById('ansWorkTitleInput').value,
        workArtist: document.getElementById('ansWorkArtistInput').value,
        isLike: document.getElementById('ansIsLikeInput').value,
        nickname: document.getElementById('ansNicknameInput').value,
        comment: document.getElementById('ansCommentInput').value
      };

      gasCall('ansProcessForm', formPayload).then(result => {

        // Phase 5-B: SNS_SYNC_REQUEST / PROMPT_PASSWORD / LOGOUT_SUCCESS は撤去済。
        // それぞれ input.html の作家伝播ロジック / Email Link 認証 (Phase 3) に
        // 移行されている。

        if (result.action === "UNLOCK_SUCCESS") {
          if (window.fsSetArtwork) {
            window.fsSetArtwork(exVal, idVal, { status: "" }).catch(e => console.error('Firestore unlock mirror failed:', e));
          }
          alert(t('alertUnlock'));
          reloadApp();
          return;
        }

        if (result.action === "ERROR") {
          alert(result.msg);
          if (result.msg.includes("リセット") || result.msg.includes("reset")) {
            reloadApp();
          } else {
            btn.innerText = originalText;
            btn.disabled = false;
          }
          return;
        }

        // GAS が { success: false, error: ... } 形式 (未認証等) で返した場合の保険。
        // result.action が undefined のままだとボタンが「通信中」のまま固まるので、
        // ここで明示的にハンドリングする。
        if (result && result.success === false) {
          alert((result.error || 'エラーが発生しました'));
          btn.innerText = originalText;
          btn.disabled = false;
          return;
        }

        if (result.action === "COUNT") {
          document.getElementById('ansInputView').style.display = 'none';
          var alreadyMsg = document.getElementById('ansAlreadyLikedMsg');
          if (alreadyMsg) alreadyMsg.style.display = 'none';
          document.getElementById('ansThankYou').style.display = 'block';
          document.getElementById('ansThankYou').classList.add('fade-in');
          var isAdditional = (document.getElementById('ansIsLikeInput').value === "0");
          // 仮表示は GAS の count、その後 Firestore 由来に上書きする
          document.getElementById('ansCountMsg').innerText = isAdditional
            ? t('ansCountMsgAdded') + result.count
            : t('ansCountMsg') + result.count;
          localStorage.setItem("voted_" + exVal + "_" + idVal, "true");
          // Firestore に書き込み → その上で Firestore 集計値で再表示
          // (dashboard.html / gallery.html と同じソースなので整合する)
          (async () => {
            try {
              if (window.fsAddLike) {
                await window.fsAddLike({
                  exCode: exVal,
                  ex_name: (document.getElementById('ansDisplayExName') || {}).innerText || '',
                  workId: idVal,
                  title: formPayload.workTitle,
                  artist: formPayload.workArtist,
                  sessionId: formPayload.sessionId,
                  nickname: formPayload.nickname,
                  comment: formPayload.comment,
                  isLike: formPayload.isLike === "1"
                });
              }
              const snap = await fsDb.collection('likes')
                .where('exCode', '==', exVal)
                .where('workId', '==', idVal)
                .get();
              let fsCount = 0;
              snap.forEach(d => { if (d.data().isLike) fsCount++; });
              document.getElementById('ansCountMsg').innerText = isAdditional
                ? t('ansCountMsgAdded') + fsCount
                : t('ansCountMsg') + fsCount;
            } catch (e) {
              console.error('Firestore count failed:', e);
            }
          })();
          var nickname = document.getElementById('ansNicknameInput').value.trim();
          if (nickname) localStorage.setItem("nickname_" + exVal, nickname);
          return;
        }

        // どの action にも該当しないレスポンス (想定外の構造) のフォールバック。
        // ここに来る = GAS 側のロジック変更で返り値構造が変わった可能性があるので、
        // ボタンを戻して console にログしておく。
        console.warn('ansProcessForm: unexpected response', result);
        alert('予期しないレスポンスを受信しました。コンソールを確認してください。');
        btn.innerText = originalText;
        btn.disabled = false;

      }).catch(err => {
        alert("通信エラー: " + err.message);
        btn.innerText = originalText;
        btn.disabled = false;
      });
    });

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBdwIxKuT6MYJalWUIEgMZVanvrLEMKcRg",
      authDomain: "rohei-printer-system.firebaseapp.com",
      projectId: "rohei-printer-system",
      storageBucket: "rohei-printer-system.firebasestorage.app",
      messagingSenderId: "762429995901",
      appId: "1:762429995901:web:f3b330d26897dc3214ea14"
    });
    const fsDb = firebase.firestore();
    const fsStorage = firebase.storage();
    window.fsUploadArtworkImage = async (exCode, artworkId, dataUrl) => {
      const blob = await (await fetch(dataUrl)).blob();
      const ref = fsStorage.ref('artworks/' + exCode + '_' + artworkId + '.jpg');
      await ref.put(blob, { contentType: 'image/jpeg' });
      return await ref.getDownloadURL();
    };
    window.fsGetArtworkData = async (exCode, artworkId) => {
      try {
        const [aSnap, eSnap] = await Promise.all([
          fsDb.collection('artworks').doc(exCode + '_' + artworkId).get(),
          fsDb.collection('exhibitions').doc(exCode).get()
        ]);
        // 練習モードバッジを表示 (来場者向け)
        if (eSnap.exists && window.sandboxBadge) {
          window.sandboxBadge.render('sandboxBadge', eSnap.data(), 'visitor', { maxWidth: '600px' });
        }
        let a = aSnap.exists ? aSnap.data() : null;

        // Firestore に未登録の作品の場合、GAS から取得してバックフィル
        let backfillExName = null;
        if (!a) {
          const gasRes = await gasCall('ansGetArtworkData');
          if (!gasRes || !gasRes.success) {
            return { success: false, msg: (gasRes && gasRes.msg) || '作品IDが見つかりません' };
          }
          a = {
            exCode: exCode,
            artwork_id: artworkId,
            security_key: gasRes.securityKey,
            status: gasRes.isRegistered ? "1" : "",
            title: gasRes.title || '',
            artist: gasRes.artist || '',
            image_url: gasRes.image || '',
            insta: (gasRes.sns && gasRes.sns.insta) || '',
            x: (gasRes.sns && gasRes.sns.x) || '',
            facebook: (gasRes.sns && gasRes.sns.fb) || '',
            web: (gasRes.sns && gasRes.sns.web) || ''
          };
          backfillExName = gasRes.exName || '';
          fsDb.collection('artworks').doc(exCode + '_' + artworkId)
            .set({ ...a, backfilledAt: new Date().toISOString() }, { merge: true })
            .catch(e => console.error('backfill artwork failed:', e));
          if (!eSnap.exists && backfillExName) {
            fsDb.collection('exhibitions').doc(exCode)
              .set({ ex_code: exCode, ex_name: backfillExName, backfilledAt: new Date().toISOString() }, { merge: true })
              .catch(e => console.error('backfill exhibition failed:', e));
          }
        }

        const e = eSnap.exists ? eSnap.data() : { ex_name: backfillExName || '' };
        return {
          success: true,
          securityKey: a.security_key,
          isRegistered: a.status != null && a.status.toString() === '1',
          exName: e.ex_name || '',
          commentsStartAt: e.comments_start_at || '',
          commentsEndAt: e.comments_end_at || '',
          title: a.title || '',
          artist: a.artist || '',
          image: a.image_url ? String(a.image_url) : '',
          sns: {
            insta: a.insta || '',
            x: a.x || '',
            fb: a.facebook || '',
            web: a.web || ''
          }
        };
      } catch (err) {
        return { success: false, msg: '取得エラー: ' + err.message };
      }
    };
    window.fsAddLike = async (data) => {
      await fsDb.collection('likes').add({ ...data, timestamp: new Date().toISOString() });
    };
    const _submitArtworkFn = firebase.app().functions('asia-northeast1').httpsCallable('submitArtwork');

    // index.html (QR スキャン経路) は URL の exp+sig (artwork_token) のみ受け付ける。
    // legacy security_key 経路はセッション 3 で撤去済。
    function _resolveArtworkAccessToken(exCode, artworkId) {
      if (expVal && sigVal && exCode === exVal && artworkId === idVal) {
        return { kind: 'artwork', exp: Number(expVal), sig: sigVal };
      }
      return null;
    }

    window.fsSetArtwork = async (exCode, artworkId, data) => {
      const accessToken = _resolveArtworkAccessToken(exCode, artworkId);
      if (!accessToken) {
        console.warn('fsSetArtwork: no access token in URL for', exCode, artworkId, '- skipping write');
        return;
      }
      const res = await _submitArtworkFn({
        exCode: exCode,
        artworkId: artworkId,
        fields: data,
        accessToken: accessToken,
      });
      if (!res || !res.data || !res.data.success) {
        throw new Error('Cloud Function が失敗しました');
      }
      return res.data;
    };
  </script>
</body>
