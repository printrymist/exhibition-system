<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      background-color: #f4f4f9;
      color: #333;
      margin: 0;
      padding: 15px;
    }

    .unity-container {
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    #unityGlobalLoading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20000;
    }

    .reg-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      margin: auto;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #444;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 12px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 16px;
    }

    .quick-box {
      background: #eef2f7;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d1d9e6;
      margin-bottom: 15px;
    }

    .sns-group {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #eee;
      margin-top: 15px;
    }

    .btn-blue {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      background: #1a73e8;
      color: white;
      font-size: 16px;
    }

    .btn-gray {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      background: #eee;
      color: #333;
      font-size: 16px;
    }

    .preview-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid #ddd;
    }

    .confirm-val {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      border-bottom: 1px solid #eee;
      padding-bottom: 2px;
    }

    #regFileBtn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 2px dashed #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 15px;
      background: #fafafa;
      color: #555;
      cursor: pointer;
      text-align: center;
    }

    #regFileBtn:hover {
      background: #f0f4ff;
      border-color: #1a73e8;
      color: #1a73e8;
    }

    #regFileInput {
      display: none;
    }

    #regLoadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      color: white;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top: 5px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .ans-container {
      width: 350px;
      max-width: 92%;
      background: white;
      padding: 30px 20px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      margin: auto;
      position: relative;
    }

    .ex-header {
      font-size: 0.85em;
      color: #888;
      letter-spacing: 0.05em;
      margin-bottom: 15px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    #ansAlreadyLikedMsg {
      display: none;
      color: #e91e63;
      font-weight: bold;
      font-size: 1.05em;
      margin-bottom: 15px;
    }

    /* (Phase A-2 簡素化で my-comment-* CSS は撤去。Thank You ページの単一取消ボタン方式に変更) */

    .work-img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .work-info h2 {
      margin: 0;
      font-size: 1.4em;
      font-weight: bold;
      overflow-wrap: break-word;
      line-height: 1.4;
      padding: 0 10px;
    }

    .work-info p {
      margin: 5px 0 25px 0;
      color: #666;
      overflow-wrap: break-word;
      padding: 0 10px;
    }

    textarea {
      width: 100%;
      margin-bottom: 15px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 16px;
    }

    .btn-black {
      width: 100%;
      padding: 18px;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: #000;
    }

    #ansSnsSection {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px dashed #ddd;
      display: none;
    }

    .sns-area {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 15px;
    }

    .sns-btn {
      text-decoration: none;
      color: #555;
      font-size: 10px;
      width: 60px;
      font-weight: bold;
    }

    .sns-icon {
      font-size: 24px;
      background: #f0f2f5;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 5px auto;
    }

    .fade-in {
      animation: fadeInAnim 0.6s ease-out forwards;
    }

    .heart-icon {
      color: #e91e63;
      font-size: 40px;
      margin-bottom: 10px;
    }

    .decoration-footer {
      margin-top: 40px;
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
    }

    #langToggle {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #f0f2f5;
      border: none;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      color: #555;
    }

    #langToggleReg {
      display: block;
      margin: 0 auto 15px auto;
      background: #f0f2f5;
      border: none;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      color: #555;
    }

    /* ─── Caption Mode (QR-only シール経由でアクセスしたとき) ─── */
    /* 紙キャプションの代わりに、スマホ画面で作品情報 + いいね + コメントを表示する。
       caption.html の items[] と同じデザイン言語で render する (font-size pt 単位、
       align / bold / italic / divider / spacer / group をそのまま採用)。 */
    #ansCaptionView {
      text-align: left;
      padding: 0 16px;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    #ansCaptionView .cap-divider {
      border: none;
      border-top: 1px solid #ddd;
      margin: 8px 0;
    }
    #ansCaptionView .cap-item {
      overflow-wrap: break-word;
      word-break: break-word;
    }
    #ansCaptionView .cap-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4em;
    }
    /* caption mode の like/comment 強調 */
    .caption-react-card {
      background: linear-gradient(135deg, #fff5f7 0%, #ffe8ec 100%);
      border: 2px solid #f8b4c0;
      border-radius: 16px;
      padding: 18px 18px 14px;
      margin: 18px 0 8px;
      box-shadow: 0 4px 12px rgba(233, 30, 99, 0.12);
    }
    .caption-react-heart {
      text-align: center;
      font-size: 36px;
      color: #e91e63;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 4px rgba(233, 30, 99, 0.3));
    }
    .caption-react-label {
      text-align: center;
      font-size: 0.95em;
      font-weight: bold;
      color: #ad1457;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div id="sandboxBadge" style="display:none; max-width:600px; margin:10px auto;"></div>

  <!-- 旧 PROMPT_PASSWORD / SNS_SYNC_REQUEST モーダル類は Phase 5-B / 6 で機能撤去済 (legacy cleanup 2026-05-09) -->

  <div id="unityGlobalLoading">
    <div class="spinner" style="border-top-color: #1a73e8;"></div>
    <div id="globalLoadingMsg" style="font-weight:bold; color:#666;">作品ステータスを確認中...</div>
  </div>

  <div class="unity-container">
    <div id="regWrapper" style="display:none; width: 100%;">
      <div id="regLoadingOverlay">
        <div class="spinner"></div>
        <div id="regSavingMsg" style="font-weight:bold; font-size:18px;">保存しています...</div>
      </div>
      <div class="reg-card" id="regMainCard">
        <button id="langToggleReg" onclick="toggleLang()">EN</button>
        <h3 id="regExName" style="color:#1a73e8; margin:0 0 15px 0;">接続中...</h3>
        <!-- 旧 regStep0 (管理パスワード入力) は Phase 6b で bypass、HMAC URL 認証で代替済 -->
        <div id="regStep1" class="step">
          <div id="regQuickSelectArea" class="quick-box" style="display:none;">
            <small id="regQuickSelectLabel" style="color:#1a73e8; font-weight:bold;">以前の登録情報から選ぶ</small>
            <select id="regArtistSelect" onchange="regApplyArtistInfo()">
              <option value="" id="regSelectDefault">-- 作家名を選択 --</option>
            </select>
          </div>
          <label id="regLabelArtist">作家名</label><input type="text" id="regArtistName">
          <label id="regLabelTitle">作品名</label><input type="text" id="regWorkTitle">
          <div class="sns-group">
            <small id="regSnsLabel" style="font-weight:bold;">📱 SNS ID入力</small>
            <input type="text" id="regSnsInsta" placeholder="Instagram ID">
            <input type="text" id="regSnsX" placeholder="X (Twitter) ID">
            <input type="text" id="regSnsFb" placeholder="Facebook ID">
            <input type="text" id="regSnsWeb" placeholder="HPまたはYouTubeのURL">
          </div>
          <label id="regLabelPhoto">作品写真</label>
          <input type="file" id="regFileInput" accept="image/*">
          <button type="button" id="regFileBtn" onclick="document.getElementById('regFileInput').click()">📷 写真を選択する</button>
          <img id="regLocalPreview" class="preview-img" style="display:none;">
          <button class="btn-blue" onclick="regToConfirm()" id="regConfirmBtn">内容を確認する</button>
        </div>
        <div id="regStep2" class="step">
          <h4 id="regConfirmTitle">登録内容の最終確認</h4>
          <img id="regFinalPreview" class="preview-img">
          <div style="margin-top:15px; background:#f0f7ff; padding:15px; border-radius:8px;">
            <small id="regConfirmArtistLabel">作家名:</small><span id="regVArtist" class="confirm-val"></span>
            <small id="regConfirmTitleLabel">作品名:</small><span id="regVTitle" class="confirm-val"></span>
            <div id="regVSnsSummary" style="font-size:12px; color:#555;"></div>
          </div>
          <button class="btn-blue" onclick="regFinalSubmit()" id="regSubmitBtn">この内容で確定・登録</button>
          <button class="btn-gray" onclick="regChangeStep(1)" id="regEditBtn">修正する</button>
        </div>
        <div id="regStep3" class="step">
          <div style="text-align:center; padding:30px 10px;">
            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
            <h2 id="regDoneTitle" style="color:green; margin-top:0;">登録完了！</h2>
            <p id="regDoneMsg" style="color:#666; line-height:1.5;">作品情報が正常に保存されました。</p>
          </div>
        </div>
      </div>
    </div>

    <div id="ansWrapper" style="display:none; width: 100%;">
      <div class="ans-container">
        <button id="langToggle" onclick="toggleLang()">EN</button>
        <div id="ansLoading">読み込み中...</div>
        <div id="ansMainContent" style="display:none;">
          <div class="ex-header" id="ansDisplayExName"></div>
          <div id="ansAlreadyLikedMsg">いいね受付済みです、追加コメントを受け付けます。</div>
          <div id="ansThankYou" style="display:none;">
            <div class="heart-icon">♥</div>
            <div id="ansCountMsg" style="font-size:1.1em; font-weight:bold; margin-bottom:15px;"></div>
            <!-- Phase A-2 簡素化: 直前の投稿だけを取消す軽量 UI。
                 visitor 認証は ensureVisitorAuth で済んでいる前提 (失敗時は表示しない)。
                 撤去後はリロードしてフォーム再表示。 -->
            <button type="button" id="ansSubmittedUndoBtn" onclick="onSubmittedUndo()"
              style="display:none; padding:6px 16px; margin-bottom:14px; background:white; color:#d93025; border:1px solid #d93025; border-radius:6px; font-size:0.88em; cursor:pointer;">🔄 取消</button>
            <div id="ansSnsSection">
              <p id="ansSnsLabel" style="color:#666; font-size:0.85em;">作家の活動をチェック</p>
              <div id="ansSnsButtons" class="sns-area"></div>
            </div>
          </div>
          <div id="ansInputView">
            <img id="ansMainImg" class="work-img" src="">
            <!-- 通常 (非 caption mode): タイトル + 作家名のみ表示 -->
            <div class="work-info" id="ansWorkInfo">
              <h2 id="ansDisplayTitle"></h2>
              <p id="ansDisplayArtist"></p>
            </div>
            <!-- caption mode 専用: caption テンプレ items[] を render -->
            <div id="ansCaptionView" style="display:none;"></div>
            <div id="ansFormContainer">
              <form id="ansLikeForm">
                <input type="hidden" name="sessionId" id="ansSessionIdInput">
                <input type="hidden" name="workID" id="ansWorkIDInput">
                <input type="hidden" name="ex" id="ansExInput">
                <input type="hidden" name="workTitle" id="ansWorkTitleInput">
                <input type="hidden" name="workArtist" id="ansWorkArtistInput">
                <input type="hidden" name="isLike" id="ansIsLikeInput" value="1">
                <input type="text" name="nickname" id="ansNicknameInput" placeholder="ニックネーム（任意）">
                <textarea name="comment" id="ansCommentInput" rows="4" placeholder="作品の感想をどうぞ！" required></textarea>
                <button type="submit" id="ansSubmitBtn" class="btn-black">感想を送って「いいね」</button>
              </form>
              <!-- 案 C: 作家本人として認識されたとき (ニックネーム = 作家名) のみ表示。
                   搬入時の写真追加・差し替えを「登録解除 → 全項目再入力」せずに済ませる裏口。
                   image_url だけ書き換える。テキスト情報や is_locked は触らない。 -->
              <div id="ansArtistPhotoArea" style="display:none; background:#f0f7ff; border:1px solid #c5d9f7; border-radius:8px; padding:12px; margin-top:14px;">
                <div style="font-size:0.85em; color:#1a73e8; margin-bottom:6px; font-weight:bold;">
                  🎨 作家本人として認識: <span id="ansArtistPhotoNameLabel"></span>
                </div>
                <div style="font-size:0.78em; color:#666; margin-bottom:10px; line-height:1.5;">
                  搬入時の写真追加・差し替えに使えます。文字情報は触らず画像だけ更新します。
                </div>
                <input type="file" id="ansArtistPhotoInput" accept="image/*" style="display:none;">
                <button type="button" id="ansArtistPhotoBtn"
                  style="padding:8px 14px; background:#1a73e8; color:white; border:none; border-radius:6px; font-size:0.88em; font-weight:bold; cursor:pointer; width:100%;">
                  📷 写真を選択して更新
                </button>
                <div id="ansArtistPhotoMsg" style="font-size:0.82em; margin-top:8px; min-height:16px; text-align:center;"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="decoration-footer">＊ ♡ ＊ ♥ ＊ ♡ ＊</div>
        <div style="text-align:center; margin-top:14px; font-size:11px;">
          <a href="/docs/?m=visitor" target="_blank" rel="noopener" style="color:#999; text-decoration:none;">📖 使い方ガイド</a>
        </div>
      </div>
    </div>
  </div>

  <script src="offline-banner.js" data-message="⚠ オフラインです。いいねは接続復帰後に反映されます。"></script>
  <script src="sessionid.js"></script>
  <script>
    // =========================================================
    // 🌟 URL パラメータ取得
    // =========================================================
    const urlParams = new URLSearchParams(window.location.search);
    const exVal  = urlParams.get('ex')  || '';
    const idVal  = urlParams.get('id')  || '';
    // key パラメータは Phase 6c で撤去 (実 security は Cloud Function 側の HMAC で検証)
    const expVal = urlParams.get('exp') || '';
    const sigVal = urlParams.get('sig') || '';
    // caption=1: caption mode で起動 (QR のみシール経由)。
    // 作品情報 (caption テンプレの items[]) をスマホ画面で表示し、紙キャプションの代替に。
    const captionMode = urlParams.get('caption') === '1';

    // Phase 6c: gas_QRlikes 経路を完全撤去。GAS_URL / gasCall は不要に。
    // すべての write は Cloud Function (submitArtwork) 経由、read は Firestore 直接。

    // =========================================================
    // 🌟 多言語辞書
    // =========================================================
    const i18n = {
      ja: {
        globalLoading:        "作品ステータスを確認中...",
        langBtn:              "EN",
        ansLoading:           "読み込み中...",
        ansAlreadyLiked:      "いいね受付済みです、追加コメントを受け付けます。",
        ansSnsLabel:          "作家の活動をチェック",
        ansNickname:          "ニックネーム（任意）",
        ansComment:           "作品の感想をどうぞ！",
        ansSubmitBtn:         "感想を送って「いいね」",
        ansSubmitBtnAdded:    "追加の感想を送る",
        ansSubmitBtnSending:  "通信中...",
        ansSubmitBtnSyncing:  "同期中...",
        ansCountMsg:          "有難うございました！ 応援数: ",
        ansCountMsgAdded:     "追加のコメント有難うございました！ 応援数: ",
        alertUnlock:          "作品の登録を解除しました。再登録が可能です。",
        regSaving:            "保存しています...",
        regQuickSelectLabel:  "以前の登録情報から選ぶ",
        regSelectDefault:     "-- 作家名を選択 --",
        regLabelArtist:       "作家名",
        regLabelTitle:        "作品名",
        regSnsLabel:          "📱 SNS ID入力",
        regSnsWebPlaceholder: "HPまたはYouTubeのURL",
        regLabelPhoto:        "作品写真",
        regFileBtn:           "📷 写真を選択する",
        regConfirmBtn:        "内容を確認する",
        regPhotoRequired:     "写真を選択してください",
        regSnsWebSet:         "登録あり",
        regSnsSummaryLabel:   "📱 SNS連携: ",
        regSnsNone:           "📱 SNS連携: なし",
        regConfirmTitle:      "登録内容の最終確認",
        regConfirmArtistLabel:"作家名:",
        regConfirmTitleLabel: "作品名:",
        regSubmitBtn:         "この内容で確定・登録",
        regEditBtn:           "修正する",
        regDoneTitle:         "登録完了！",
        regDoneMsg:           "作品情報が正常に保存されました。",
        regError:             "登録エラー: ",
      },
      en: {
        globalLoading:        "Checking artwork status...",
        langBtn:              "JP",
        ansLoading:           "Loading...",
        ansAlreadyLiked:      "You've already liked this. You can still leave a comment.",
        ansSnsLabel:          "Follow the artist",
        ansNickname:          "Nickname (optional)",
        ansComment:           "Share your thoughts on this artwork!",
        ansSubmitBtn:         "Send & Like ♡",
        ansSubmitBtnAdded:    "Send another comment",
        ansSubmitBtnSending:  "Sending...",
        ansSubmitBtnSyncing:  "Syncing...",
        ansCountMsg:          "Thank you! Likes: ",
        ansCountMsgAdded:     "Thank you for your comment! Likes: ",
        alertUnlock:          "Artwork unlocked. You can register again.",
        regSaving:            "Saving...",
        regQuickSelectLabel:  "Select from previous entries",
        regSelectDefault:     "-- Select artist --",
        regLabelArtist:       "Artist name",
        regLabelTitle:        "Artwork title",
        regSnsLabel:          "📱 SNS ID",
        regSnsWebPlaceholder: "Website or YouTube URL",
        regLabelPhoto:        "Artwork photo",
        regFileBtn:           "📷 Select photo",
        regConfirmBtn:        "Review before submitting",
        regPhotoRequired:     "Please select a photo",
        regSnsWebSet:         "Set",
        regSnsSummaryLabel:   "📱 SNS: ",
        regSnsNone:           "📱 SNS: None",
        regConfirmTitle:      "Confirm registration",
        regConfirmArtistLabel:"Artist:",
        regConfirmTitleLabel: "Title:",
        regSubmitBtn:         "Confirm & Register",
        regEditBtn:           "Edit",
        regDoneTitle:         "Registered!",
        regDoneMsg:           "Artwork information saved successfully.",
        regError:             "Registration error: ",
      }
    };

    const browserLang = (navigator.language || "ja").startsWith("ja") ? "ja" : "en";
    let currentLang = localStorage.getItem("rohei_lang") || browserLang;

    // Storage download URL を Hosting CDN 経由 (/img/...) に翻訳して、
    // egress を Storage ($0.12/GB) → Hosting CDN (無料) に振り替える。
    // 翻訳できないとき (旧 URL / Drive 等の外部 URL) は元の URL をそのまま返す。
    function translateImageUrl(url, updatedAt) {
      if (!url) return '';
      const raw = String(url);
      const m = raw.match(/\/o\/((?:artworks|gallery)%2F[^?]+)/i);
      if (!m) return raw;
      let objPath;
      try { objPath = decodeURIComponent(m[1]); } catch (_e) { return raw; }
      let ver = '';
      if (updatedAt) {
        if (typeof updatedAt === 'object' && updatedAt.seconds) ver = String(updatedAt.seconds);
        else if (typeof updatedAt === 'number') ver = String(updatedAt);
        else ver = String(updatedAt).replace(/[^0-9A-Za-z_-]/g, '').slice(0, 32);
      }
      return '/img/' + objPath + (ver ? ('?v=' + ver) : '');
    }

    // =========================================================
    // Phase A-2: visitor 認証 (CF issueVisitorToken → signInWithCustomToken)。
    // artwork_token (URL の exp+sig) を CF に渡して検証 → custom token を取得し、
    // claims に sessionId が乗ったまま signIn することで、Firestore Rules の
    // sessionId 一致 update/delete をパスできる。
    // 失敗しても無認証で create 自体は通るので、致命ではない (delete だけ封じられる)。
    let _visitorAuthReady = null;
    function ensureVisitorAuth() {
      if (_visitorAuthReady) return _visitorAuthReady;
      _visitorAuthReady = (async () => {
        if (!expVal || !sigVal) {
          // 旧 URL (exp+sig 無し) では sign in できない。
          console.warn('visitor auth: exp/sig が無いので skip (anon write のみ可能)');
          return false;
        }
        try {
          const fn = visitorFunctions.httpsCallable('issueVisitorToken');
          const res = await fn({
            exCode: exVal,
            artworkId: idVal,
            exp: Number(expVal),
            sig: sigVal,
            sessionId: getOrCreateSessionId(),
          });
          const token = res && res.data && res.data.token;
          if (!token) throw new Error('token が空でした');
          await visitorAuth.signInWithCustomToken(token);
          return true;
        } catch (e) {
          console.warn('visitor auth: signIn 失敗 (delete UI は無効化されます)', e && e.message ? e.message : e);
          return false;
        }
      })();
      return _visitorAuthReady;
    }

    // ─── Caption Mode 専用ロジック ───
    // QR のみシールから来た visitor (?caption=1) 向けに、紙キャプの代わりに
    // スマホ画面で作品情報を表示する。caption.html の items[] と同じ design を使う。

    // テンプレ JSON を loaded once でキャッシュ (caption_template_id から items[] を引く)
    let _cachedPresets = null;
    async function _loadAllPresets() {
      if (_cachedPresets) return _cachedPresets;
      try {
        const [officialRes, baseRes] = await Promise.all([
          fetch('/data/official-presets.json'),
          fetch('/data/caption-presets.json'),
        ]);
        const official = officialRes.ok ? await officialRes.json() : { templates: {} };
        const base = baseRes.ok ? await baseRes.json() : {};
        // official.templates は { official_solo: {...}, ... } 形式
        // base は { minimal: {...}, gallery: {...}, ... } 形式
        _cachedPresets = Object.assign({}, base, official.templates || {});
        return _cachedPresets;
      } catch (e) {
        console.warn('preset load failed:', e);
        _cachedPresets = {};
        return _cachedPresets;
      }
    }

    function _captionEscape(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function _captionFormatValue(val, currency, comma) {
      if (!currency && !comma) return String(val);
      const num = parseFloat(String(val).replace(/[^0-9.-]/g, ''));
      if (isNaN(num)) return String(val);
      const str = comma ? Math.round(num).toLocaleString('ja-JP') : Math.round(num).toString();
      return currency ? currency + str : str;
    }

    function _captionAffix(text, scale) {
      if (!text) return '';
      const sc = (scale !== undefined && scale !== null && isFinite(scale) && scale > 0) ? scale : 0.75;
      return `<span style="font-size:${sc}em;">${_captionEscape(text)}</span>`;
    }

    function _captionFieldHtml(item, art) {
      const raw = art[item.name];
      const val = raw == null ? '' : String(raw).trim();
      if (!val) return '';
      const formatted = _captionFormatValue(val, item.currency || '', item.comma || false);
      const escaped = _captionEscape(formatted);
      const text = _captionAffix(item.prefix, item.affixScale) + escaped + _captionAffix(item.suffix, item.affixScale);
      const align = item.align && item.align !== 'inherit' ? item.align : 'left';
      const weight = item.bold ? 'bold' : 'normal';
      const fstyle = item.italic ? 'italic' : 'normal';
      // pt をそのまま使用 (mobile でも適切なサイズになる)
      return `<div class="cap-item" style="font-size:${item.size}pt;font-weight:${weight};font-style:${fstyle};text-align:${align};margin-bottom:2px;">${text}</div>`;
    }

    function renderCaptionItems(items, art) {
      let html = '';
      (items || []).forEach(item => {
        if (item.type === 'field') {
          html += _captionFieldHtml(item, art);
        } else if (item.type === 'group') {
          const parts = (item.children || []).map(c => {
            const raw = art[c.name];
            const val = raw == null ? '' : String(raw).trim();
            if (!val) return null;
            const formatted = _captionFormatValue(val, c.currency || '', c.comma || false);
            const escaped = _captionEscape(formatted);
            const v = _captionAffix(c.prefix, c.affixScale) + escaped + _captionAffix(c.suffix, c.affixScale);
            const w = c.bold ? 'bold' : 'normal';
            const fs = c.italic ? 'italic' : 'normal';
            return `<span style="font-size:${c.size}pt;font-weight:${w};font-style:${fs};">${v}</span>`;
          }).filter(Boolean);
          if (parts.length === 0) return;
          const align = item.align && item.align !== 'inherit' ? item.align : 'left';
          if (align === 'between') {
            html += `<div class="cap-group" style="justify-content:space-between;">${parts.join('')}</div>`;
          } else {
            const sepHtml = _captionEscape(item.sep || '');
            html += `<div class="cap-item" style="text-align:${align};margin-bottom:2px;">${parts.join(sepHtml)}</div>`;
          }
        } else if (item.type === 'divider') {
          html += `<hr class="cap-divider">`;
        } else if (item.type === 'spacer') {
          // size は '4mm' 等。スマホでは em 換算する (1mm ≒ 0.25em)
          const sizeStr = String(item.size || '4mm');
          const mmMatch = sizeStr.match(/^(\d+(?:\.\d+)?)mm$/);
          const px = mmMatch ? Math.round(parseFloat(mmMatch[1]) * 3.78) : 12;
          html += `<div style="height:${px}px;"></div>`;
        }
      });
      return html;
    }

    async function applyCaptionMode(res) {
      const tplKey = (res.captionTemplateId || '').toString();
      // preset:xxx 形式のみ対応 (saved:xxx は Firestore Rules で visitor 読めない)
      if (tplKey.indexOf('preset:') !== 0) {
        return false;
      }
      const presetName = tplKey.slice('preset:'.length);
      const presets = await _loadAllPresets();
      const template = presets[presetName];
      if (!template) return false;
      // items[] が caption の本体 (operator が Custom タブで設計したもの)。
      // paperMode='qr_only' のテンプレでは items はスマホ caption を表す。
      const phoneItems = template.items;
      if (!Array.isArray(phoneItems) || phoneItems.length === 0) return false;
      const html = renderCaptionItems(phoneItems, res.artwork || {});
      const view = document.getElementById('ansCaptionView');
      view.innerHTML = html;
      view.style.display = 'block';
      // 旧 work-info (title + artist) は caption に含まれるので隠す
      const workInfo = document.getElementById('ansWorkInfo');
      if (workInfo) workInfo.style.display = 'none';
      // フォームを「目立つカード」化
      const formContainer = document.getElementById('ansFormContainer');
      if (formContainer && !formContainer.classList.contains('caption-react-card')) {
        formContainer.classList.add('caption-react-card');
        const heart = document.createElement('div');
        heart.className = 'caption-react-heart';
        heart.textContent = '❤';
        const label = document.createElement('div');
        label.className = 'caption-react-label';
        label.textContent = 'いいね & 感想を送る';
        formContainer.insertBefore(label, formContainer.firstChild);
        formContainer.insertBefore(heart, formContainer.firstChild);
      }
      return true;
    }

    function ansRenderData(res, ex, id) {
      if (!res || !res.success) {
        document.getElementById('ansLoading').innerHTML =
          '<div style="color:red">Error: ' + (res ? res.msg : "No data") + '</div>';
        return;
      }
      document.getElementById('ansDisplayExName').innerText = res.exName;
      document.getElementById('ansDisplayTitle').innerText = res.title;
      document.getElementById('ansDisplayArtist').innerText = res.artist;
      document.getElementById('ansWorkTitleInput').value = res.title;
      document.getElementById('ansWorkArtistInput').value = res.artist;
      applyCommentWindow(res.commentsStartAt, res.commentsEndAt);
      if (res.image) {
        let imgSrc = res.image;
        if (imgSrc.indexOf('drive.google.com') !== -1) {
          var match = imgSrc.match(/[-\w]{25,}/);
          if (match) imgSrc = "https://drive.google.com/thumbnail?id=" + match[0] + "&sz=w400";
        }
        document.getElementById('ansMainImg').src = imgSrc;
        document.getElementById('ansMainImg').style.display = 'block';
      }
      ansShowSnsButtons(res.sns);
      if (localStorage.getItem("voted_" + ex + "_" + id)) {
        document.getElementById('ansIsLikeInput').value = "0";
        document.getElementById('ansSubmitBtn').innerText = t('ansSubmitBtnAdded');
        document.getElementById('ansAlreadyLikedMsg').style.display = 'block';
      }
      var savedNickname = localStorage.getItem("nickname_" + ex);
      if (savedNickname) {
        document.getElementById('ansNicknameInput').value = savedNickname;
      }
      // caption mode (QR-only シール経由) のとき、items[] driven の caption 表示に切替
      if (captionMode) {
        applyCaptionMode(res).catch(err => {
          console.warn('caption mode apply failed:', err);
        });
      }
      document.getElementById('ansMainContent').style.display = 'block';
    }

    function applyCommentWindow(startIso, endIso) {
      const now = Date.now();
      const start = startIso ? new Date(startIso).getTime() : null;
      const end = endIso ? new Date(endIso).getTime() : null;
      let outOfWindow = false;
      let reason = '';
      if (start && !isNaN(start) && now < start) {
        outOfWindow = true;
        reason = '感想の受付は ' + new Date(start).toLocaleString('ja-JP') + ' から開始されます。';
      } else if (end && !isNaN(end) && now > end) {
        outOfWindow = true;
        reason = '感想の受付期間は終了しました。';
      }
      const formContainer = document.getElementById('ansFormContainer');
      let notice = document.getElementById('ansWindowNotice');
      if (outOfWindow) {
        if (formContainer) formContainer.style.display = 'none';
        if (!notice) {
          notice = document.createElement('div');
          notice.id = 'ansWindowNotice';
          notice.style.cssText = 'margin:18px 0; padding:14px; background:#fff8e1; color:#8a6d3b; border:1px solid #ffe0a3; border-radius:8px; text-align:center; font-size:0.95em;';
          formContainer.parentNode.insertBefore(notice, formContainer);
        }
        notice.textContent = reason;
        notice.style.display = 'block';
      } else {
        if (formContainer) formContainer.style.display = '';
        if (notice) notice.style.display = 'none';
      }
    }

    function ansShowSnsButtons(snsData) {
      if (!snsData) return;
      var snsArea = document.getElementById('ansSnsButtons');
      snsArea.innerHTML = "";
      var hasSns = false;
      const icons = { insta: "📷", x: "𝕏", fb: "📘", web: "🌐" };
      const urls = { insta: "https://www.instagram.com/", x: "https://x.com/", fb: "https://www.facebook.com/", web: "https://" };
      ["insta", "x", "fb", "web"].forEach(key => {
        if (snsData[key] && snsData[key].trim() !== "") {
          hasSns = true;
          var val = snsData[key].trim();
          var link = val.startsWith("http") ? val : urls[key] + val.replace(/^@/, "");
          var a = document.createElement("a");
          a.href = link; a.target = "_blank"; a.className = "sns-btn";
          a.innerHTML = '<div class="sns-icon">' + icons[key] + '</div>' +
            key.charAt(0).toUpperCase() + key.slice(1);
          snsArea.appendChild(a);
        }
      });
      if (hasSns) document.getElementById('ansSnsSection').style.display = "block";
    }

    // 旧 ansResetForm (isAdmin_* localStorage で gate していた応援記録リセット) は撤去。
    // localStorage に isAdmin_* を書き込むコードがどこにも無く実質永久に dead だった。

    // Phase A-2 簡素化: 直前の投稿を Thank You ページ上で取消す軽量 UI。
    // ページ遷移を跨いだ「過去のコメントを編集・削除」は別セッションの sessionId 不一致で
    // 動作不安定だったので断念。きちんとした取消は来場者の Auth 化 (将来) で対応する方針。
    let _lastSubmitted = null; // { docId, wasLike }

    async function onSubmittedUndo() {
      if (!_lastSubmitted || !_lastSubmitted.docId) {
        alert('取消対象がありません。');
        return;
      }
      if (!navigator.onLine) { alert('オフラインです。接続を確認してください。'); return; }
      const ok = await ensureVisitorAuth();
      if (!ok) {
        alert('認証ができませんでした。新しい QR コードで開き直してください。');
        return;
      }
      const btn = document.getElementById('ansSubmittedUndoBtn');
      if (btn) { btn.disabled = true; btn.textContent = '取消中…'; }
      try {
        const visitorFsDb = _visitorApp.firestore();
        await visitorFsDb.collection('likes').doc(_lastSubmitted.docId).delete();
        if (_lastSubmitted.wasLike) {
          // 初回 like だった場合は voted_* もクリア (再 submit できるように)
          localStorage.removeItem('voted_' + exVal + '_' + idVal);
        }
        _lastSubmitted = null;
        // フォームに戻す = reloadApp で状態を再構築
        reloadApp();
      } catch (e) {
        console.error('submitted undo failed:', e);
        alert('取消に失敗しました: ' + (e && e.message ? e.message : e));
        if (btn) { btn.disabled = false; btn.textContent = '🔄 取消'; }
      }
    }

    // Phase 6a: visitor の comment/like は GAS を経由せず直接 Firestore に書く。
    // 旧 ansProcessForm 経由の二重書き (GAS comments シート + Firestore likes) を
    // 廃止して、Firestore likes コレクションを唯一のソースにする。
    // 作家本人によるロック解除 (UNLOCK) のみ submitArtwork 経由で artwork status
    // をクリア。RESET (旧 GAS キャッシュ flush) は GAS 依存が消えるので不要。
    document.getElementById('ansLikeForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('ansSubmitBtn');
      var originalText = btn.innerText;
      btn.innerText = t('ansSubmitBtnSending');
      btn.disabled = true;

      const formPayload = {
        sessionId: document.getElementById('ansSessionIdInput').value,
        workID: idVal,
        ex: exVal,
        workTitle: document.getElementById('ansWorkTitleInput').value,
        workArtist: document.getElementById('ansWorkArtistInput').value,
        isLike: document.getElementById('ansIsLikeInput').value,
        nickname: document.getElementById('ansNicknameInput').value,
        comment: document.getElementById('ansCommentInput').value
      };

      try {
        const nicknameTrim = (formPayload.nickname || '').trim();
        const artistTrim = (formPayload.workArtist || '').trim();
        const commentTrim = (formPayload.comment || '').trim();
        const isArtistSelf = nicknameTrim.length > 0 && nicknameTrim === artistTrim;

        if (isArtistSelf) {
          // 作家自身が自作品に投稿しようとしている: UNLOCK だけ許可、それ以外はエラー。
          const cl = commentTrim.toLowerCase();
          if (commentTrim === '登録解除' || cl === 'unlock') {
            if (!window.fsSetArtwork) {
              throw new Error('fsSetArtwork が利用できません');
            }
            await window.fsSetArtwork(exVal, idVal, { status: "" });
            alert(t('alertUnlock'));
            reloadApp();
            return;
          }
          alert('入力エラー：作家本人のお名前での投稿はできません。');
          btn.innerText = originalText;
          btn.disabled = false;
          return;
        }

        // 通常の visitor フロー: Firestore likes に直接書き込み。
        let submittedDocId = null;
        const wasLikeSubmit = formPayload.isLike === "1";
        if (window.fsAddLike) {
          submittedDocId = await window.fsAddLike({
            exCode: exVal,
            ex_name: (document.getElementById('ansDisplayExName') || {}).innerText || '',
            workId: idVal,
            title: formPayload.workTitle,
            artist: formPayload.workArtist,
            sessionId: formPayload.sessionId,
            nickname: formPayload.nickname,
            comment: formPayload.comment,
            isLike: wasLikeSubmit
          });
        }

        // Phase A-2 簡素化: 直前送信を記録 → Thank You ページの取消ボタンを有効化
        // 同セッション内の同タブだけで使うので、visitor 認証成功時のみ表示する。
        _lastSubmitted = submittedDocId ? { docId: submittedDocId, wasLike: wasLikeSubmit } : null;

        document.getElementById('ansInputView').style.display = 'none';
        var alreadyMsg = document.getElementById('ansAlreadyLikedMsg');
        if (alreadyMsg) alreadyMsg.style.display = 'none';
        document.getElementById('ansThankYou').style.display = 'block';
        document.getElementById('ansThankYou').classList.add('fade-in');

        // 取消ボタンは visitor 認証成功 + docId が取れた時のみ表示
        const undoBtn = document.getElementById('ansSubmittedUndoBtn');
        if (undoBtn) {
          undoBtn.disabled = false;
          undoBtn.textContent = '🔄 取消';
          undoBtn.style.display = 'none';
          if (_lastSubmitted) {
            ensureVisitorAuth().then(ok => {
              if (ok && _lastSubmitted) undoBtn.style.display = 'inline-block';
            });
          }
        }

        var isAdditional = (formPayload.isLike === "0");
        let fsCount = 0;
        try {
          const snap = await fsDb.collection('likes')
            .where('exCode', '==', exVal)
            .where('workId', '==', idVal)
            .get();
          snap.forEach(d => { if (d.data().isLike) fsCount++; });
        } catch (e) {
          console.error('Firestore count failed:', e);
        }
        document.getElementById('ansCountMsg').innerText = isAdditional
          ? t('ansCountMsgAdded') + fsCount
          : t('ansCountMsg') + fsCount;

        localStorage.setItem("voted_" + exVal + "_" + idVal, "true");
        if (nicknameTrim) localStorage.setItem("nickname_" + exVal, nicknameTrim);
      } catch (err) {
        console.error('submit failed:', err);
        alert('送信エラー: ' + (err && err.message ? err.message : err));
        btn.innerText = originalText;
        btn.disabled = false;
      }
    });

  </script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script>
    const _firebaseConfig = {
      apiKey: "AIzaSyBdwIxKuT6MYJalWUIEgMZVanvrLEMKcRg",
      authDomain: "rohei-printer-system.firebaseapp.com",
      projectId: "rohei-printer-system",
      storageBucket: "rohei-printer-system.firebasestorage.app",
      messagingSenderId: "762429995901",
      appId: "1:762429995901:web:f3b330d26897dc3214ea14"
    };
    firebase.initializeApp(_firebaseConfig);
    // Phase A-2: visitor 認証用の named app。default app と auth 状態を分離する
    // (来場者の visitor session を主催者ログインの IndexedDB に書き込まないため)。
    // signInWithCustomToken した uid は role='visitor' / sessionId 入りで、
    // Firestore Rules (Phase A-1) の sessionId 一致 update/delete をパスする。
    const _visitorApp = firebase.initializeApp(_firebaseConfig, 'visitor');
    const visitorAuth = _visitorApp.auth();
    const visitorFunctions = _visitorApp.functions('asia-northeast1');
    // Persistence は NONE (タブメモリのみ、IndexedDB を汚さない、shared device に優しい)
    visitorAuth.setPersistence(firebase.auth.Auth.Persistence.NONE)
      .catch(e => console.warn('visitor auth persistence:', e));

    const fsDb = firebase.firestore();
    window.fsUploadArtworkImage = async (exCode, artworkId, dataUrl) => {
      const accessToken = _resolveArtworkAccessToken(exCode, artworkId);
      if (!accessToken) {
        throw new Error('URL の exp/sig が見つかりません。新しい QR コード / URL を主催者から再発行してもらってください。');
      }
      const res = await _uploadArtworkImageFn({
        exCode: exCode,
        artworkId: artworkId,
        imageBase64: dataUrl,
        accessToken: accessToken,
      });
      if (!res || !res.data || !res.data.success) {
        throw new Error('Cloud Function が失敗しました');
      }
      return res.data.url;
    };
    // Phase 6c: GAS バックフィル経路を撤去。Firestore のみが artwork データのソース。
    // (rules も Phase 5-A で固めてあり、anon クライアントから artworks の create/update は
    // できないので、そもそも backfill は silent fail していた経路。)
    window.fsGetArtworkData = async (exCode, artworkId) => {
      try {
        // β-3: artwork doc は anon 直 read 不可になったので CF 経由で取得。
        //   URL の exp+sig (artwork_token) を accessToken として渡す。
        //   exhibitions doc は引き続き public get で直接読む。
        const accessToken = _resolveArtworkAccessToken(exCode, artworkId);
        const [aRes, eSnap] = await Promise.all([
          _getArtworkFn({ exCode: exCode, artworkId: artworkId, accessToken: accessToken }),
          fsDb.collection('exhibitions').doc(exCode).get()
        ]);
        if (eSnap.exists && window.sandboxBadge) {
          window.sandboxBadge.render('sandboxBadge', eSnap.data(), 'visitor', { maxWidth: '600px' });
        }
        const aData = aRes && aRes.data;
        if (!aData || !aData.success || !aData.artwork) {
          return { success: false, msg: '作品IDが見つかりません' };
        }
        const a = aData.artwork;
        const e = eSnap.exists ? eSnap.data() : {};
        return {
          success: true,
          securityKey: a.security_key,
          isRegistered: a.status != null && a.status.toString() === '1',
          exName: e.ex_name || '',
          commentsStartAt: e.comments_start_at || '',
          commentsEndAt: e.comments_end_at || '',
          title: a.title || '',
          artist: a.artist || '',
          image: translateImageUrl(a.image_url, a.updatedAt),
          sns: {
            insta: a.insta || '',
            x: a.x || '',
            fb: a.facebook || '',
            web: a.web || ''
          },
          // caption mode 用: 作品の全フィールドと、運営者が選んだ caption テンプレ ID
          artwork: a,
          captionTemplateId: (e.caption_template_id || '').toString(),
        };
      } catch (err) {
        return { success: false, msg: '取得エラー: ' + err.message };
      }
    };
    window.fsAddLike = async (data) => {
      const ref = await fsDb.collection('likes').add({ ...data, timestamp: new Date().toISOString() });
      return ref.id;
    };
    const _submitArtworkFn = firebase.app().functions('asia-northeast1').httpsCallable('submitArtwork');
    const _uploadArtworkImageFn = firebase.app().functions('asia-northeast1').httpsCallable('uploadArtworkImage');
    const _getArtworkFn = firebase.app().functions('asia-northeast1').httpsCallable('getArtwork');
    const _listArtworksByArtistFn = firebase.app().functions('asia-northeast1').httpsCallable('listArtworksByArtist');

    // index.html (QR スキャン経路) は URL の exp+sig (artwork_token) のみ受け付ける。
    // legacy security_key 経路はセッション 3 で撤去済。
    function _resolveArtworkAccessToken(exCode, artworkId) {
      if (expVal && sigVal && exCode === exVal && artworkId === idVal) {
        return { kind: 'artwork', exp: Number(expVal), sig: sigVal };
      }
      return null;
    }

    window.fsSetArtwork = async (exCode, artworkId, data, opts) => {
      opts = opts || {};
      // Phase 2 (b) fan-out: source !== target のときは URL の token をそのまま使い、
      //   CF に sourceArtworkId を渡す。CF が HMAC を sourceArtworkId で検証する。
      const isFanOut = opts.sourceArtworkId && opts.sourceArtworkId !== artworkId;
      let accessToken;
      if (isFanOut) {
        if (!expVal || !sigVal || opts.sourceArtworkId !== idVal) {
          throw new Error('fan-out: URL の token と sourceArtworkId が一致しません');
        }
        accessToken = { kind: 'artwork', exp: Number(expVal), sig: sigVal };
      } else {
        accessToken = _resolveArtworkAccessToken(exCode, artworkId);
        if (!accessToken) {
          throw new Error('URL の exp/sig が見つかりません。新しい QR コード / URL を主催者から再発行してもらってください。');
        }
      }
      const payload = {
        exCode: exCode,
        artworkId: artworkId,
        fields: data,
        accessToken: accessToken,
      };
      if (isFanOut) payload.sourceArtworkId = opts.sourceArtworkId;
      const res = await _submitArtworkFn(payload);
      if (!res || !res.data || !res.data.success) {
        throw new Error('Cloud Function が失敗しました');
      }
      return res.data;
    };

    // 案 C: 作家本人 (ニックネーム = 作家名) 限定の写真追加・更新 UI。
    // 搬入時に複数作品の写真を素早く貼り替えるための裏口。
    // image_url だけ書き換える。CF 側の artist 整合チェック (B-1.5) と is_locked チェック (Phase 2)
    // は通常通り効くので、ロック済 / 別作家の作品には書けない。
    function _checkArtistSelfPhotoUpdate() {
      const area = document.getElementById('ansArtistPhotoArea');
      const nicknameEl = document.getElementById('ansNicknameInput');
      const artistEl = document.getElementById('ansWorkArtistInput');
      if (!area || !nicknameEl || !artistEl) return;
      const nick = (nicknameEl.value || '').trim();
      const artist = (artistEl.value || '').trim();
      if (nick && artist && nick === artist) {
        area.style.display = 'block';
        document.getElementById('ansArtistPhotoNameLabel').textContent = artist;
      } else {
        area.style.display = 'none';
      }
    }

    async function _onArtistPhotoSelected(e) {
      const file = e.target.files && e.target.files[0];
      const fileInput = e.target;
      if (!file) return;
      const msgEl = document.getElementById('ansArtistPhotoMsg');
      const btn = document.getElementById('ansArtistPhotoBtn');
      if (!navigator.onLine) {
        msgEl.style.color = '#d93025';
        msgEl.textContent = '⚠ オフラインです。接続を確認してください。';
        fileInput.value = '';
        return;
      }
      btn.disabled = true;
      msgEl.style.color = '#888';
      msgEl.textContent = '画像をリサイズ中…';
      try {
        // regWrapper と同じ 800px center-crop で JPEG 化
        const dataUrl = await new Promise((resolve, reject) => {
          const u = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            URL.revokeObjectURL(u);
            const size = 800;
            const min = Math.min(img.width, img.height);
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            canvas.getContext('2d').drawImage(img, (img.width - min) / 2, (img.height - min) / 2, min, min, 0, 0, size, size);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.onerror = () => { URL.revokeObjectURL(u); reject(new Error('画像のデコードに失敗しました')); };
          img.src = u;
        });
        msgEl.textContent = 'アップロード中…';
        const url = await window.fsUploadArtworkImage(exVal, idVal, dataUrl);
        msgEl.textContent = '保存中…';
        await window.fsSetArtwork(exVal, idVal, { image_url: url });
        msgEl.style.color = '#0b8043';
        msgEl.textContent = '✅ 写真を更新しました';
        setTimeout(() => { if (msgEl.textContent.indexOf('更新しました') >= 0) msgEl.textContent = ''; }, 5000);
      } catch (err) {
        console.error('artist photo update failed:', err);
        msgEl.style.color = '#d93025';
        msgEl.textContent = 'エラー: ' + (err && err.message ? err.message : err);
      } finally {
        btn.disabled = false;
        fileInput.value = '';  // 同じファイルの再選択を可能にする
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const nicknameEl = document.getElementById('ansNicknameInput');
      if (nicknameEl) {
        nicknameEl.addEventListener('input', _checkArtistSelfPhotoUpdate);
        nicknameEl.addEventListener('change', _checkArtistSelfPhotoUpdate);
      }
      const btn = document.getElementById('ansArtistPhotoBtn');
      const fileInput = document.getElementById('ansArtistPhotoInput');
      if (btn && fileInput) {
        btn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', _onArtistPhotoSelected);
      }
    });
  </script>
