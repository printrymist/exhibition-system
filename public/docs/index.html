<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>マニュアル - My Art Fair</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo/qriine_lc_3_icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root {
      --sidebar-w: 260px;
      --primary: #1a73e8;
      --text: #222;
      --muted: #666;
      --border: #e0e0e0;
      --bg: #fafbfc;
      --card-bg: #ffffff;
      --code-bg: #f4f6f8;
      --quote-bg: #fff8e1;
      --quote-border: #f1c40f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                   "Yu Gothic UI", "Segoe UI", Meiryo, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      position: sticky;
      top: 0;
      align-self: start;
      max-height: 100vh;
      overflow-y: auto;
    }
    .sidebar h1 {
      font-size: 16px;
      margin: 0 0 16px 0;
      color: var(--primary);
    }
    .sidebar ul { list-style: none; padding: 0; margin: 0; }
    .sidebar li { margin: 4px 0; }
    .sidebar a {
      display: block;
      padding: 9px 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .sidebar a:hover { background: #f0f4ff; }
    .sidebar a.active {
      background: var(--primary);
      color: white;
      font-weight: bold;
    }
    .sidebar-section-title {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 18px 0 6px 12px;
    }
    .sidebar-footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    .sidebar-footer a {
      display: inline;
      padding: 0;
      color: var(--primary);
    }
    .content {
      padding: 32px 48px 80px 48px;
      max-width: 920px;
      width: 100%;
    }
    .content h1, .content h2, .content h3, .content h4 {
      line-height: 1.35;
      margin-top: 1.6em;
      margin-bottom: 0.5em;
    }
    .content h1 {
      font-size: 28px;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 8px;
      margin-top: 0.4em;
    }
    .content h2 {
      font-size: 22px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .content h3 { font-size: 18px; color: var(--text); }
    .content h4 { font-size: 16px; color: var(--muted); }
    .content p { margin: 0.7em 0; }
    .content ul, .content ol { padding-left: 1.5em; }
    .content li { margin: 4px 0; }
    .content a { color: var(--primary); }
    .content code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.92em;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    .content pre {
      background: var(--code-bg);
      padding: 14px 18px;
      border-radius: 6px;
      overflow-x: auto;
    }
    .content pre code {
      background: transparent;
      padding: 0;
    }
    .content blockquote {
      background: var(--quote-bg);
      border-left: 4px solid var(--quote-border);
      margin: 1em 0;
      padding: 10px 18px;
      color: #444;
    }
    .content blockquote p:first-child { margin-top: 0; }
    .content blockquote p:last-child { margin-bottom: 0; }
    .content table {
      border-collapse: collapse;
      margin: 1em 0;
      width: 100%;
      font-size: 0.95em;
    }
    .content th, .content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .content th {
      background: #eef3fb;
      font-weight: bold;
    }
    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }
    .content img {
      max-width: 100%;
      height: auto;
    }
    #status {
      color: var(--muted);
      padding: 40px 0;
      text-align: center;
    }
    #status.error { color: #d93025; }
    .hamburger {
      display: none;
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 100;
      background: var(--primary);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        top: 0; left: 0;
        width: 80%; max-width: 320px;
        height: 100vh;
        z-index: 99;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
        box-shadow: 2px 0 12px rgba(0,0,0,0.12);
      }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: block; }
      .content { padding: 60px 18px 60px 18px; }
      .content h1 { font-size: 22px; }
      .content h2 { font-size: 19px; }
      .scrim {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 98;
      }
      .scrim.show { display: block; }
    }
  </style>
</head>
<body>
  <button class="hamburger" id="hamburgerBtn" aria-label="メニュー">☰</button>
  <div class="scrim" id="scrim"></div>
  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <h1>📖 My Art Fair マニュアル</h1>
      <div class="sidebar-section-title">マニュアル一覧</div>
      <ul id="navList">
        <!-- JS で生成 -->
      </ul>
    </nav>
    <main class="content">
      <div id="status">読み込み中…</div>
      <article id="article"></article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script>
    const MANUALS = [
      { key: 'organizer',     file: 'manual_organizer.md',     label: '🛠️ 主催者向け' },
      { key: 'artist',        file: 'manual_artist.md',        label: '🎨 作家向け' },
      { key: 'visitor',       file: 'manual_visitor.md',       label: '👥 来場者向け' },
      { key: 'sns_promotion', file: 'manual_sns_promotion.md', label: '📣 SNS 告知' },
    ];

    function getCurrentKey() {
      const m = new URLSearchParams(location.search).get('m');
      // 旧 URL 互換 (?m=operator → ?m=organizer)
      if (m === 'operator') return 'organizer';
      return MANUALS.find(x => x.key === m) ? m : 'organizer';
    }

    function renderNav(currentKey) {
      const ul = document.getElementById('navList');
      ul.innerHTML = MANUALS.map(m =>
        `<li><a href="?m=${m.key}" class="${m.key === currentKey ? 'active' : ''}">${m.label}</a></li>`
      ).join('');
    }

    async function loadManual(key) {
      const def = MANUALS.find(x => x.key === key);
      if (!def) {
        document.getElementById('status').textContent = '不明なマニュアルです。';
        return;
      }
      document.title = def.label.replace(/^[^ ]+ /, '') + ' - My Art Fair マニュアル';
      const status = document.getElementById('status');
      const article = document.getElementById('article');
      status.style.display = 'block';
      status.classList.remove('error');
      status.textContent = '読み込み中…';
      article.innerHTML = '';
      try {
        const res = await fetch(def.file, { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const md = await res.text();
        marked.setOptions({ breaks: false, gfm: true });
        article.innerHTML = marked.parse(md);
        status.style.display = 'none';
        // Anchor jump if hash present
        if (location.hash) {
          const target = document.querySelector(location.hash);
          if (target) target.scrollIntoView();
        } else {
          window.scrollTo(0, 0);
        }
      } catch (err) {
        status.classList.add('error');
        status.textContent = '読み込みに失敗しました: ' + (err.message || err);
      }
    }

    function setupSidebarToggle() {
      const sidebar = document.getElementById('sidebar');
      const scrim = document.getElementById('scrim');
      const btn = document.getElementById('hamburgerBtn');
      function toggle(open) {
        if (open == null) open = !sidebar.classList.contains('open');
        sidebar.classList.toggle('open', open);
        scrim.classList.toggle('show', open);
      }
      btn.addEventListener('click', () => toggle());
      scrim.addEventListener('click', () => toggle(false));
      // 各リンクをタップしたら閉じる (モバイル)
      document.getElementById('navList').addEventListener('click', () => {
        if (window.matchMedia('(max-width: 768px)').matches) toggle(false);
      });
    }

    const key = getCurrentKey();
    renderNav(key);
    loadManual(key);
    setupSidebarToggle();
  </script>
</body>
</html>
