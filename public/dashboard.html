<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>展覧会ダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: #1a2a4a;
      font-size: 17px;
      padding: 24px;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(180,60,180,0.55) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 15%, rgba(60,90,200,0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 80%, rgba(140,40,160,0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 15% 90%, rgba(40,80,160,0.55) 0%, transparent 55%),
        linear-gradient(135deg, #1a0b2e 0%, #0f1a3d 50%, #2a0b3a 100%);
      background-size: 200% 200%, 200% 200%, 200% 200%, 200% 200%, 100% 100%;
      animation: aurora 18s ease-in-out infinite;
    }
    @keyframes aurora {
      0%, 100% {
        background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 0 0;
      }
      50% {
        background-position: 100% 50%, 0% 100%, 0% 0%, 100% 50%, 0 0;
      }
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .ex-name {
      font-size: 2.4em;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }
    .updated-at {
      font-size: 0.95em;
      color: rgba(255,255,255,0.7);
      margin-top: 8px;
    }
    .big-numbers {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 26px 22px;
      box-shadow: 0 8px 32px rgba(31,38,135,0.12);
      border: 1px solid rgba(255,255,255,0.6);
      text-align: center;
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(31,38,135,0.2); }
    .stat-label {
      font-size: 1.05em;
      color: #6b6685;
      margin-bottom: 10px;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .stat-value {
      font-size: 3.2em;
      font-weight: 800;
      color: #1a2a4a;
      line-height: 1;
    }
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 28px;
      align-items: start;
    }
    .rankings-column {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }
    .ranking-sub {
      font-size: 0.7em;
      font-weight: normal;
      color: #888;
      margin-left: 8px;
    }
    .ranking-card, .feed-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 32px rgba(31,38,135,0.12);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .ranking-title {
      font-size: 1.3em;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a2a4a;
      border-bottom: 2px solid #c5a3ff;
      padding-bottom: 10px;
    }
    .ranking-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-rank {
      width: 30px;
      font-weight: 700;
      color: #999;
      font-size: 1.25em;
      text-align: center;
    }
    .ranking-rank.gold { color: #d4a017; font-size: 1.5em; }
    .ranking-rank.silver { color: #888; font-size: 1.4em; }
    .ranking-rank.bronze { color: #a0522d; font-size: 1.3em; }
    .ranking-info {
      flex: 1;
      min-width: 0;
    }
    .ranking-title-text {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 1.1em;
    }
    .ranking-artist {
      font-size: 0.92em;
      color: #888;
      margin-top: 2px;
    }
    .ranking-count {
      font-weight: 800;
      color: #d93025;
      font-size: 1.7em;
      min-width: 50px;
      text-align: right;
    }
    .feed-card {
      max-height: 600px;
      overflow-y: auto;
    }
    .ranking-card {
      max-height: 600px;
      overflow-y: auto;
    }
    .feed-item {
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .feed-item:last-child { border-bottom: none; }
    .feed-item.fresh { animation: pop 0.6s; }
    .feed-meta {
      display: flex;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .feed-time { font-size: 0.85em; color: #aaa; }
    .feed-work {
      font-size: 1em;
      font-weight: 600;
      color: #1a73e8;
    }
    .feed-nickname {
      font-size: 0.95em;
      color: #666;
    }
    .feed-comment {
      font-size: 1.05em;
      color: #2c2c2c;
      line-height: 1.55;
      word-break: break-word;
      margin-top: 4px;
    }
    .empty {
      text-align: center;
      color: #aaa;
      padding: 28px 0;
      font-size: 1em;
    }
    @keyframes pop {
      0% { background: #fff5b1; }
      100% { background: transparent; }
    }
    @media (max-width: 900px) {
      body { font-size: 16px; padding: 16px; }
      .big-numbers { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .main-content { grid-template-columns: 1fr; }
      .stat-value { font-size: 2.5em; }
      .stat-card { padding: 18px 14px; }
      .ex-name { font-size: 1.7em; }
      .ranking-title { font-size: 1.15em; }
    }
    @media (min-width: 1400px) {
      body { font-size: 18px; }
    }

    .ended-banner {
      background: rgba(255, 240, 180, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(218, 165, 32, 0.5);
      border-radius: 14px;
      padding: 16px 22px;
      margin-bottom: 20px;
      position: relative;
      display: none;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      box-shadow: 0 4px 20px rgba(218, 165, 32, 0.18);
    }
    .ended-banner.show { display: flex; }
    .ended-banner-icon { font-size: 1.8em; flex-shrink: 0; }
    .ended-banner-text { flex: 1; min-width: 220px; }
    .ended-banner-title {
      font-weight: 700;
      font-size: 1.1em;
      color: #5b4500;
    }
    .ended-banner-body {
      font-size: 0.95em;
      color: #6b5400;
      margin-top: 4px;
      line-height: 1.5;
    }
    .ended-banner-btn {
      padding: 10px 20px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 0.95em;
      flex-shrink: 0;
    }
    .ended-banner-btn:hover { background: #1557b0; color: white; }
    .ended-banner-dismiss {
      position: absolute;
      top: 6px;
      right: 10px;
      background: transparent;
      border: none;
      font-size: 1.4em;
      color: #888;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
    }
    .ended-banner-dismiss:hover { color: #333; }
  </style>
</head>

<body>
  <div class="header">
    <div class="ex-name" id="exName">読み込み中...</div>
    <div class="updated-at" id="updatedAt"></div>
    <div style="margin-top:10px;">
      <a id="navAnalytics" href="analytics.html"
         style="display:inline-block; padding:6px 14px; background:rgba(255,255,255,0.18); color:#fff; border:1px solid rgba(255,255,255,0.5); border-radius:8px; font-size:13px; text-decoration:none; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);">
        📊 詳細分析
      </a>
    </div>
  </div>
  <script>
    (function () {
      var ex = (new URLSearchParams(location.search).get('ex') || '').trim();
      var link = document.getElementById('navAnalytics');
      if (link && ex && /^[A-Za-z0-9_-]+$/.test(ex)) {
        link.href = 'analytics.html?ex=' + encodeURIComponent(ex);
      }
    })();
  </script>

  <div id="sandboxBadge" style="display:none;"></div>

  <div class="ended-banner" id="endedBanner">
    <div class="ended-banner-icon" aria-hidden="true">📦</div>
    <div class="ended-banner-text">
      <div class="ended-banner-title">会期終了から <span id="endedDays">―</span> 日経過しています</div>
      <div class="ended-banner-body">
        現在の公開状態は <strong><span id="endedVisibility">―</span></strong> です。Web 展覧会をアーカイブとして公開する場合は、設定画面で公開状態を切り替えてください。
      </div>
    </div>
    <a class="ended-banner-btn" id="endedBannerLink" href="#">Web 展覧会の設定を開く →</a>
    <button class="ended-banner-dismiss" onclick="dismissEndedBanner()" aria-label="閉じる" title="このセッション中は閉じる">×</button>
  </div>

  <div class="big-numbers">
    <div class="stat-card">
      <div class="stat-label">参加者数</div>
      <div class="stat-value" id="statVisitors">―</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">いいね数</div>
      <div class="stat-value" id="statLikes">―</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">コメント数</div>
      <div class="stat-value" id="statComments">―</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">登録作品数</div>
      <div class="stat-value" id="statArtworks">―</div>
    </div>
  </div>

  <div class="main-content">
    <div class="rankings-column">
      <div class="ranking-card">
        <div class="ranking-title">🏆 総合いいねランキング <span class="ranking-sub">会場 + Web 合算</span></div>
        <div id="likesRanking"><div class="empty">まだいいねがありません</div></div>
      </div>
      <div class="ranking-card">
        <div class="ranking-title">🏛️ 会場いいねランキング <span class="ranking-sub">物理 QR 経由のみ</span></div>
        <div id="physicalRanking"><div class="empty">まだ会場でのいいねがありません</div></div>
      </div>
      <div class="ranking-card">
        <div class="ranking-title">🌐 Web いいねランキング <span class="ranking-sub">バーチャル展覧会経由のみ</span></div>
        <div id="webRanking"><div class="empty">まだ Web からのいいねがありません</div></div>
      </div>
    </div>
    <div class="feed-card">
      <div class="ranking-title">📝 最新コメント</div>
      <div id="commentFeed"><div class="empty">まだコメントがありません</div></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBdwIxKuT6MYJalWUIEgMZVanvrLEMKcRg",
      authDomain: "rohei-printer-system.firebaseapp.com",
      projectId: "rohei-printer-system",
      storageBucket: "rohei-printer-system.firebasestorage.app",
      messagingSenderId: "762429995901",
      appId: "1:762429995901:web:f3b330d26897dc3214ea14"
    });
    const fsDb = firebase.firestore();

    const exVal = (new URLSearchParams(location.search).get('ex') || '').trim();

    // 属性値に埋め込んでも安全なよう " ' まで含めてエスケープする
    // (textContent→innerHTML 版は " ' を残すため、将来属性に使うと XSS になる)。
    function escapeHtml(str) {
      return String(str == null ? '' : str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // 会期終了バナー: comments_end_at が設定されていて、終了から
    // ENDED_BANNER_THRESHOLD_DAYS 以上経過し、かつ gallery_visibility が
    // public でないときに「設定画面を開く」リンクを出す。
    const ENDED_BANNER_THRESHOLD_DAYS = 1;
    const VISIBILITY_LABEL = {
      closed: '非公開 (closed)',
      visitor_only: '来場者のみ (visitor_only)',
      public: '公開 (public)',
    };
    function evaluateEndedBanner(exData) {
      const banner = document.getElementById('endedBanner');
      if (!banner) return;
      banner.classList.remove('show');
      if (sessionStorage.getItem('endedBanner_dismissed_' + exVal)) return;
      const visibility = (exData.gallery_visibility || 'closed').trim();
      if (visibility === 'public') return;
      const endStr = (exData.comments_end_at || '').trim();
      if (!endStr) return;
      const end = new Date(endStr);
      if (isNaN(end.getTime())) return;
      const days = Math.floor((Date.now() - end.getTime()) / 86400000);
      if (days < ENDED_BANNER_THRESHOLD_DAYS) return;
      document.getElementById('endedDays').innerText = String(days);
      document.getElementById('endedVisibility').innerText =
        VISIBILITY_LABEL[visibility] || visibility;
      document.getElementById('endedBannerLink').href =
        'web-exhibition.html?ex=' + encodeURIComponent(exVal);
      banner.classList.add('show');
    }
    function dismissEndedBanner() {
      sessionStorage.setItem('endedBanner_dismissed_' + exVal, '1');
      document.getElementById('endedBanner').classList.remove('show');
    }

    // β-3 (2026-05-27): artworks の直 read に Firebase Auth (operator/organizer) が必要に
    // なったので、operator-auth.js でログイン状態を確認してから query を始める。
    // 未ログインなら「運営者ログインが必要です」のメッセージを出して停止。
    function startDashboard() {
      let artworks = [];
      let likes = [];
      const seenLikeIds = new Set();
      let firstLikeSnapshot = true;

      fsDb.collection('exhibitions').doc(exVal).onSnapshot(snap => {
        if (snap.exists) {
          const exData = snap.data();
          const title = (exData.ex_name || '').trim() || exVal;
          document.getElementById('exName').textContent = title;
          document.title = title + ' - ダッシュボード';
          if (window.sandboxBadge) {
            window.sandboxBadge.render('sandboxBadge', exData, 'operator');
          }
          evaluateEndedBanner(exData);
        } else {
          document.getElementById('exName').textContent = exVal + ' (展覧会未登録)';
          document.getElementById('endedBanner').classList.remove('show');
        }
      });

      const _u = firebase.auth().currentUser;
      const _email = ((_u || {}).email || '').trim().toLowerCase();
      const _isOp = _email === 'rymist1@gmail.com';
      let artQ = fsDb.collection('artworks').where('exCode', '==', exVal);
      if (!_isOp && _email) artQ = artQ.where('organizerEmail', '==', _email);
      artQ.onSnapshot(snap => {
        artworks = [];
        snap.forEach(d => artworks.push(d.data()));
        renderAll();
      });

      fsDb.collection('likes').where('exCode', '==', exVal).onSnapshot(snap => {
        const next = [];
        const newIds = [];
        snap.forEach(d => {
          next.push({ id: d.id, ...d.data() });
          if (!firstLikeSnapshot && !seenLikeIds.has(d.id)) newIds.push(d.id);
          seenLikeIds.add(d.id);
        });
        likes = next;
        firstLikeSnapshot = false;
        renderAll(newIds);
      });

      function getArtworkInfo(workId) {
        const a = artworks.find(art => (art.artwork_id || art.artworkId) === workId);
        return {
          title: (a && a.title) || workId,
          artist: (a && a.artist) || ''
        };
      }

      function renderAll(newCommentIds) {
        // 参加者数 = isLike=true を1回以上記録した sessionId の数（実際にいいねした人）
        const visitors = new Set(likes.filter(l => l.isLike && l.sessionId).map(l => l.sessionId)).size;
        const totalLikes = likes.filter(l => l.isLike).length;
        const totalComments = likes.filter(l => l.comment && l.comment.trim()).length;
        const totalArtworks = artworks.filter(a => (a.status || '').toString() === '1').length;

        document.getElementById('statVisitors').textContent = visitors.toLocaleString();
        document.getElementById('statLikes').textContent = totalLikes.toLocaleString();
        document.getElementById('statComments').textContent = totalComments.toLocaleString();
        document.getElementById('statArtworks').textContent = totalArtworks.toLocaleString();

        // 合算: 物理 + Web 両方を含むいいね数
        renderRanking('likesRanking', countByWork(l => l.isLike), 'いいね');
        // 会場 (物理 QR): source が 'gallery' でない doc。旧 doc も source 未設定 = 物理扱い
        renderRanking('physicalRanking', countByWork(l => l.isLike && l.source !== 'gallery'), 'いいね');
        // Web ギャラリー: source === 'gallery'
        renderRanking('webRanking', countByWork(l => l.isLike && l.source === 'gallery'), 'いいね');
        renderFeed(newCommentIds || []);

        document.getElementById('updatedAt').textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
      }

      function countByWork(predicate) {
        const counts = {};
        likes.forEach(l => {
          if (predicate(l) && l.workId) counts[l.workId] = (counts[l.workId] || 0) + 1;
        });
        return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
      }

      function renderRanking(elId, sorted, emptyLabel) {
        const el = document.getElementById(elId);
        if (sorted.length === 0) {
          el.innerHTML = '<div class="empty">まだ' + emptyLabel + 'がありません</div>';
          return;
        }
        el.innerHTML = sorted.map(([workId, count], i) => {
          const info = getArtworkInfo(workId);
          const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
          return '<div class="ranking-item">'
            + '<div class="ranking-rank ' + cls + '">' + (i + 1) + '</div>'
            + '<div class="ranking-info">'
            + '<div class="ranking-title-text">' + escapeHtml(info.title) + '</div>'
            + '<div class="ranking-artist">' + escapeHtml(info.artist) + '</div>'
            + '</div>'
            + '<div class="ranking-count">' + count + '</div>'
            + '</div>';
        }).join('');
      }

      function renderFeed(newIds) {
        const items = likes
          .filter(l => l.comment && l.comment.trim())
          .sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''))
          .slice(0, 30);

        const el = document.getElementById('commentFeed');
        if (items.length === 0) {
          el.innerHTML = '<div class="empty">まだコメントがありません</div>';
          return;
        }
        el.innerHTML = items.map(l => {
          const info = getArtworkInfo(l.workId);
          const time = l.timestamp ? new Date(l.timestamp).toLocaleString('ja-JP') : '';
          const fresh = newIds.indexOf(l.id) !== -1 ? ' fresh' : '';
          return '<div class="feed-item' + fresh + '">'
            + '<div class="feed-meta">'
            + '<span class="feed-work">' + escapeHtml(info.title) + '</span>'
            + '<span class="feed-nickname">— ' + escapeHtml(l.nickname || 'Anonymous') + '</span>'
            + '<span class="feed-time">' + time + '</span>'
            + '</div>'
            + '<div class="feed-comment">' + escapeHtml(l.comment) + '</div>'
            + '</div>';
        }).join('');
      }

    }
  </script>
  <script src="js/sandbox-badge.js?v=20260505b"></script>
  <script src="js/operator-auth.js"></script>
  <script>
    (function () {
      var exNameEl = document.getElementById('exName');
      if (!exVal) {
        exNameEl.textContent = '展覧会コードが指定されていません（?ex=...）';
        return;
      }
      // 認証完了を待つ。メールリンクからの遷移はまず completeSignInIfNeeded。
      window.operatorAuth.completeSignInIfNeeded()
        .catch(function (err) { console.warn('completeSignInIfNeeded:', err); });
      var started = false;
      window.operatorAuth.onAuthChange(function (user) {
        if (started) return;
        if (user && user.email) {
          started = true;
          startDashboard();
        } else {
          // 未ログイン: 来場者画面と区別する穏やかなメッセージ。register.html 経由で
          // ログインしてから戻ってきてもらう。
          exNameEl.innerHTML =
            '🔒 運営者ログインが必要です。' +
            '<a href="register.html?ex=' + encodeURIComponent(exVal) + '" ' +
            'style="color:#1a73e8;margin-left:8px;text-decoration:underline;">' +
            'ログイン画面へ</a>';
        }
      });
    })();
  </script>
</body>

</html>
